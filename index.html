function CampusesTab({ T, dens }) {
  const ALL = window.ATTENDANCE;
  const TODAY = new Date();
  const cards = window.CAMPUSES.map((c) => {
    const rows = ALL.filter((r) => r.campus === c);
    if (!rows.length) return null;
    const ck = window.agg.kpis(rows, TODAY);
    return { campus: c, k: ck };
  }).filter(Boolean).filter((x) => x.k.completedWeeks.length > 0).sort((a, b) => b.k.allTimeTotal - a.k.allTimeTotal);

  return (
    <div style={{ padding: dens ? 20 : 28 }}>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Campuses</div>
        <h2 style={{ fontFamily: T.display, fontSize: 26, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>Side-by-side</h2>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: dens ? 14 : 18 }}>
        {cards.map((card) => <CampusCard key={card.campus} T={T} dens={dens} c={card.campus} k={card.k} />)}
      </div>
    </div>);

}

function CampusCard({ T, dens, c, k }) {
  const fullName = window.CAMPUS_LABEL && window.CAMPUS_LABEL[c] || c;
  const sub = window.CAMPUS_SUB && window.CAMPUS_SUB[c] || '';
  const latest = k.latestWeek;
  const prev = k.prevWeek;
  const wow = latest && prev ? (latest.total - prev.total) / prev.total * 100 : null;
  const wowAbs = latest && prev ? latest.total - prev.total : null;
  const lastYearTotal = latest ? window.agg.sameWeekLastYear(window.ATTENDANCE.filter((r) => r.campus === c), latest.weekOf) : null;
  const yoy = latest && lastYearTotal ? (latest.total - lastYearTotal) / lastYearTotal * 100 : null;
  const yoyAbs = latest && lastYearTotal ? latest.total - lastYearTotal : null;
  const recent = k.completedWeeks.slice(-26);

  return (
    <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 20 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14, paddingBottom: 12, borderBottom: `1px solid ${T.ruleLight}` }}>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 11, color: T.wine, letterSpacing: '.1em', fontWeight: 600 }}>{c}</div>
          <h3 style={{ fontFamily: T.display, fontSize: 20, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>{fullName}</h3>
          {sub && <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 12, color: T.ink3, marginTop: 2 }}>{sub}</div>}
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontFamily: T.display, fontSize: 30, fontWeight: 500, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{window.fmtFull(latest?.total || 0)}</div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3, letterSpacing: '.16em', textTransform: 'uppercase', marginTop: 4 }}>This week</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 14 }}>
        <MiniDelta T={T} label="vs last wk" delta={wow} abs={wowAbs} />
        <MiniDelta T={T} label="vs last yr" delta={yoy} abs={yoyAbs} />
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3, letterSpacing: '.16em', textTransform: 'uppercase' }}>Avg / wk</div>
          <div style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>{window.fmtFull(k.avgWeek)}</div>
        </div>
      </div>

      <window.LineChart
        width={dens ? 620 : 660} height={90}
        series={[{ name: 'Total', color: T.wine, values: recent.map((w) => w.total) }]}
        xLabels={recent.map((w) => w.weekOf.slice(5))}
        fill={true}
        colors={[T.wine]}
        padding={{ t: 6, r: 6, b: 18, l: 32 }}
        gridColor={T.ruleLight}
        textColor={T.ink3} />
      
    </div>);

}

function MiniDelta({ T, label, delta, abs }) {
  const has = delta != null && !isNaN(delta);
  const good = has && delta >= 0;
  const tone = !has ? T.ink3 : good ? T.good : T.bad;
  return (
    <div>
      <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3, letterSpacing: '.16em', textTransform: 'uppercase' }}>{label}</div>
      <div style={{ fontFamily: T.display, fontSize: 17, fontWeight: 600, color: tone, fontVariantNumeric: 'tabular-nums', marginTop: 2 }}>
        {!has ? '—' : (good ? '↑' : '↓') + ' ' + Math.abs(delta).toFixed(1) + '%'}
      </div>
      {has && abs != null && <div style={{ fontFamily: T.mono, fontSize: 9.5, color: tone, fontVariantNumeric: 'tabular-nums', fontWeight: 600, marginTop: 1 }}>{abs >= 0 ? '+' : ''}{Math.round(abs).toLocaleString()}</div>}
    </div>);

}

// ============= RECORDS =============

function RecordsTab({ T, dens, onOpenRecord, onEditRecord }) {
  const ALL = window.ATTENDANCE;
  const SERVICE_CATS_FILTERED = window.SERVICE_CATS.filter(c => c !== 'Special Event');
  const events = window.loadEventRegistry();
  const [campuses, setCampuses] = React.useState([]);
  const [cats, setCats] = React.useState([]);
  const [eventFilter, setEventFilter] = React.useState([]);
  const [fromDate, setFromDate] = React.useState('');
  const [toDate, setToDate] = React.useState('');
  const [sort, setSort] = React.useState({ key: 'date', dir: 'desc' });
  const [search, setSearch] = React.useState('');

  const filtered = React.useMemo(() => {
    let r = ALL;
    if (campuses.length) r = r.filter((x) => campuses.includes(x.campus));
    if (cats.length) r = r.filter((x) => cats.includes(x.cat));
    if (eventFilter.length) r = r.filter((x) => eventFilter.includes(x.eventId));
    if (fromDate) r = r.filter((x) => x.date >= fromDate);
    if (toDate) r = r.filter((x) => x.date <= toDate);
    if (search) {
      const q = search.toLowerCase();
      r = r.filter((x) => x.date.includes(q) || x.cat.toLowerCase().includes(q) || x.campus.toLowerCase().includes(q));
    }
    return r.slice().sort((a, b) => {
      const av = a[sort.key], bv = b[sort.key];
      if (av == null && bv == null) return 0;
      if (av == null) return 1; if (bv == null) return -1;
      const cmp = av < bv ? -1 : av > bv ? 1 : 0;
      return sort.dir === 'asc' ? cmp : -cmp;
    });
  }, [campuses, cats, eventFilter, fromDate, toDate, sort, search]);

  const sortIcon = (key) => {
    if (sort.key !== key) return <span style={{ color: T.ink3, fontSize: 9, marginLeft: 4 }}>↕</span>;
    return <span style={{ color: T.wine, fontSize: 10, marginLeft: 4 }}>{sort.dir === 'asc' ? '↑' : '↓'}</span>;
  };

  const Pill = ({ active, onClick, children }) =>
    <button onClick={onClick} style={{
      padding: '4px 10px', borderRadius: 999, border: `1px solid ${active ? T.wine : T.rule}`,
      background: active ? T.wine : 'transparent', color: active ? '#fbf6ec' : T.ink2,
      fontFamily: T.sans, fontSize: 11.5, fontWeight: 500, cursor: 'pointer'
    }}>{children}</button>;

  const inpSt = { height: 32, padding: '0 8px', background: T.card, border: `1px solid ${T.rule}`, borderRadius: 4, color: T.ink, fontFamily: T.sans, fontSize: 12.5, outline: 'none' };

  return (
    <div style={{ padding: dens ? 20 : 28 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14 }}>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Records</div>
          <h2 style={{ fontFamily: T.display, fontSize: 26, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>Every service</h2>
        </div>
        <div style={{ position: 'relative' }}>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="search…"
          style={{ padding: '6px 12px 6px 28px', background: T.card, border: `1px solid ${T.rule}`, borderRadius: 4, color: T.ink, fontFamily: T.sans, fontSize: 12.5, width: 220, outline: 'none' }} />
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={T.ink3} strokeWidth="2" style={{ position: 'absolute', left: 10, top: 9 }}>
            <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </div>
      </div>

      {/* Date range */}
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center', marginBottom: 10 }}>
        <span style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, letterSpacing: '.1em', textTransform: 'uppercase' }}>Date</span>
        <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={inpSt} />
        <span style={{ fontFamily: T.sans, fontSize: 12, color: T.ink3 }}>to</span>
        <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={inpSt} />
        {(fromDate || toDate) && (
          <button onClick={() => { setFromDate(''); setToDate(''); }} style={{ padding: '3px 8px', borderRadius: 4, border: `1px solid ${T.rule}`, background: 'transparent', color: T.ink3, fontFamily: T.mono, fontSize: 10, cursor: 'pointer' }}>clear</button>
        )}
      </div>

      {/* Campus filter */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8, alignItems: 'center' }}>
        <span style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, letterSpacing: '.1em', textTransform: 'uppercase', marginRight: 4 }}>Campus</span>
        {window.CAMPUSES.map((c) =>
        <Pill key={c} active={campuses.includes(c)} onClick={() => setCampuses((p) => p.includes(c) ? p.filter((x) => x !== c) : [...p, c])}>{c}</Pill>
        )}
      </div>

      {/* Service filter — no Special Event, Thursday Service shown as The Voice */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8, alignItems: 'center' }}>
        <span style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, letterSpacing: '.1em', textTransform: 'uppercase', marginRight: 4 }}>Service</span>
        {SERVICE_CATS_FILTERED.map((c) =>
        <Pill key={c} active={cats.includes(c)} onClick={() => setCats((p) => p.includes(c) ? p.filter((x) => x !== c) : [...p, c])}>
          {c === 'Thursday Service' ? 'The Voice' : c}
        </Pill>
        )}
      </div>

      {/* Event filter */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14, alignItems: 'center' }}>
        <span style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, letterSpacing: '.1em', textTransform: 'uppercase', marginRight: 4 }}>Event</span>
        {events.map((ev) =>
        <Pill key={ev.id} active={eventFilter.includes(ev.id)} onClick={() => setEventFilter((p) => p.includes(ev.id) ? p.filter((x) => x !== ev.id) : [...p, ev.id])}>
          {ev.name}
        </Pill>
        )}
      </div>

      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, overflow: 'hidden' }}>
        <div style={{ padding: '10px 16px', borderBottom: `1px solid ${T.ruleLight}`, fontFamily: T.mono, fontSize: 11, color: T.ink3 }}>
          {filtered.length.toLocaleString()} services · showing first {Math.min(40, filtered.length)}
        </div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: T.sans, fontSize: dens ? 12 : 13 }}>
          <thead>
            <tr style={{ borderBottom: `1px solid ${T.rule}`, color: T.ink3, background: T.cardAlt }}>
              {[
              ['date', 'Date', 'left'],
              ['campus', 'Campus', 'left'],
              ['cat', 'Service', 'left'],
              ['main', 'Main', 'right'],
              ['fk', 'FaithKids', 'right'],
              ['ms', 'Mainstream', 'right'],
              ['total', 'Total', 'right']].
              map(([key, label, a]) =>
              <th key={key} onClick={() => setSort((s) => ({ key, dir: s.key === key && s.dir === 'desc' ? 'asc' : 'desc' }))} style={{
                textAlign: a, padding: `${dens ? 8 : 10}px 12px`, fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.18em',
                textTransform: 'uppercase', fontWeight: 500, cursor: 'pointer', userSelect: 'none'
              }}>{label}{sortIcon(key)}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {filtered.slice(0, 40).map((r, i) =>
            <tr key={i} onClick={() => onOpenRecord(r)} style={{ borderBottom: `1px solid ${T.ruleLight}`, cursor: 'pointer' }}>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, fontFamily: T.mono, fontSize: 11.5, color: T.ink2 }}>{r.date}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, fontWeight: 600 }}>{r.campus}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, fontFamily: T.display, fontSize: 14, color: T.ink2 }}><span style={{ fontStyle: 'italic' }}>{window.serviceLabel(r)}</span>{r.eventName && <span style={{ fontFamily: T.sans, fontStyle: 'normal', fontSize: 10, background: r.excludeFromWeekly ? 'rgba(166,133,52,0.15)' : 'rgba(125,58,53,0.12)', color: r.excludeFromWeekly ? T.gold : T.wine, borderRadius: 3, padding: '1px 5px', marginLeft: 6, fontWeight: 600 }}>{r.eventName}</span>}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: r.main ? T.ink : T.ink3 }}>{r.main ?? '—'}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: r.fk ? T.ink : T.ink3 }}>{r.fk ?? '—'}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: r.ms ? T.ink : T.ink3 }}>{r.ms ?? '—'}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 12px`, textAlign: 'right', fontFamily: T.display, fontSize: 15, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(r.total)}</td>
                <td style={{ padding: `${dens ? 6 : 9}px 8px`, textAlign: 'center' }}>
                  {onEditRecord && <button onClick={(e) => { e.stopPropagation(); onEditRecord(r); }} title="Edit" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: T.ink3, fontSize: 14, padding: '2px 4px', lineHeight: 1 }}>✎</button>}
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>
    </div>);

}

// ============= DRAWER =============

function Drawer({ record, onClose, theme, onDataChange }) {
  const T = theme;
  const sibs = window.ATTENDANCE.filter((r) => r.date === record.date).sort((a, b) => a.campus < b.campus ? -1 : 1);
  const total = sibs.reduce((s, r) => s + (r.total || 0), 0);
  const series = window.ATTENDANCE.
  filter((r) => r.campus === record.campus && r.cat === record.cat).
  sort((a, b) => a.date < b.date ? -1 : 1);
  const fullName = window.CAMPUS_LABEL && window.CAMPUS_LABEL[record.campus] || record.campus;
  return (
    <div style={{ position: 'absolute', inset: 0, background: 'rgba(35,24,17,.4)', zIndex: 10, display: 'flex', justifyContent: 'flex-end' }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{
        width: 480, height: '100%', background: T.paper, padding: 32, overflow: 'auto', borderLeft: `1px solid ${T.rule}`,
        boxShadow: '-12px 0 40px rgba(0,0,0,.18)'
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <div>
            <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.18em', color: T.ink3, textTransform: 'uppercase' }}>Service detail</div>
            <h3 style={{ fontFamily: T.display, fontSize: 30, margin: '8px 0 0', fontWeight: 500, letterSpacing: '-0.01em' }}>{window.serviceLabel(record)}</h3>
            <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 16, color: T.ink2, marginTop: 4 }}>{fullName} · {record.date}</div>
          </div>
          <button onClick={onClose} style={{ background: 'transparent', border: `1px solid ${T.rule}`, width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', color: T.ink2, fontSize: 14 }}>✕</button>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 10, marginBottom: 24 }}>
          {(record.msHigh != null || record.msMiddle != null
            ? [
              { l: 'Total', v: record.total, big: true },
              { l: 'Main Service', v: record.main },
              { l: 'FaithKids', v: record.fk },
              { l: 'Mainstream High', v: record.msHigh },
              { l: 'Mainstream Middle', v: record.msMiddle }
            ]
            : [
              { l: 'Total', v: record.total, big: true },
              { l: 'Main Service', v: record.main },
              { l: 'FaithKids', v: record.fk },
              { l: 'Mainstream', v: record.ms }
            ]
          ).map((it, i) =>
          <div key={i} style={{ padding: 14, border: `1px solid ${T.rule}`, background: T.card, borderRadius: 4 }}>
              <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>{it.l}</div>
              <div style={{ fontFamily: T.display, fontSize: it.big ? 32 : 22, fontWeight: 500, marginTop: 6, fontVariantNumeric: 'tabular-nums' }}>{it.v == null ? '—' : window.fmtFull(it.v)}</div>
            </div>
          )}
        </div>

        <div style={{ marginBottom: 24 }}>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 10 }}>Trend · {window.serviceLabel(record)} at {record.campus}</div>
          <window.LineChart
            width={416} height={130}
            series={[{ name: window.serviceLabel(record), values: series.map((s) => s.total), color: T.wine }]}
            xLabels={series.map((s) => s.date.slice(5))}
            fill={true} colors={[T.wine]}
            padding={{ t: 10, r: 8, b: 24, l: 36 }}
            gridColor={T.ruleLight} textColor={T.ink3} />
          
        </div>

        <div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 10 }}>Same date · all services</div>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: T.sans, fontSize: 12 }}>
            <tbody>
            {sibs.map((s, i) =>
              <tr key={i} style={{ borderBottom: `1px solid ${T.ruleLight}` }}>
                <td style={{ padding: '8px 0', color: s === record ? T.wine : T.ink2 }}>{s.campus}</td>
                <td style={{ padding: '8px 0', fontStyle: 'italic', fontFamily: T.display, color: s === record ? T.wine : T.ink2 }}>{window.serviceLabel(s)}</td>
                <td style={{ padding: '8px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums', fontWeight: s === record ? 600 : 400, color: s === record ? T.wine : T.ink }}>{window.fmtFull(s.total)}</td>
              </tr>
              )}
            <tr style={{ borderTop: `2px solid ${T.ink}`, fontWeight: 600 }}>
              <td colSpan="2" style={{ padding: '10px 0' }}>All campuses</td>
              <td style={{ padding: '10px 0', textAlign: 'right', fontFamily: T.display, fontSize: 18, fontWeight: 600 }}>{window.fmtFull(total)}</td>
            </tr>
            </tbody>
          </table>
        </div>
        <window.EventAssignPicker T={T} record={record} onDataChange={onDataChange} />
      </div>
    </div>);

}

// Popup: every Sunday/Midweek entry that makes up the overview card, for the selected week.
function BreakdownModal({ T, dens, bucket, rows, weekOf, onClose }) {
  const sorted = [...(rows || [])].sort((a, b) => (b.total || 0) - (a.total || 0));
  const hasMs = sorted.some(r => (r.ms || 0) > 0);
  const sum = (k) => sorted.reduce((s, r) => s + (r[k] || 0), 0);
  const cols = ['Campus', 'Service', 'Main', 'FaithKids', ...(hasMs ? ['Mainstream'] : []), 'Total'];
  return (
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(35,24,17,.45)', zIndex: 1000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, animation: 'bdFadeIn .18s ease' }}>
      <style>{`@keyframes bdFadeIn { from { opacity: 0; } to { opacity: 1; } }`}</style>
      <div onClick={(e) => e.stopPropagation()} style={{ width: 'min(720px, 100%)', maxHeight: '85vh', overflow: 'auto', background: T.paper, border: `1px solid ${T.rule}`, borderRadius: 8, padding: 32, boxShadow: '0 24px 60px rgba(0,0,0,.3)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
          <div>
            <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.18em', color: T.ink3, textTransform: 'uppercase' }}>{bucket} breakdown · all campuses</div>
            <h3 style={{ fontFamily: T.display, fontSize: 30, margin: '8px 0 0', fontWeight: 500, letterSpacing: '-0.01em' }}>{window.fmtFull(sum('total'))}<span style={{ fontStyle: 'italic', fontSize: 15, color: T.ink2, fontWeight: 400 }}> total</span></h3>
            <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 15, color: T.ink2, marginTop: 4 }}>Week of {weekOf} · {sorted.length} {sorted.length === 1 ? 'entry' : 'entries'}</div>
          </div>
          <button onClick={onClose} style={{ background: 'transparent', border: `1px solid ${T.rule}`, width: 32, height: 32, borderRadius: '50%', cursor: 'pointer', color: T.ink2, fontSize: 14, flexShrink: 0 }}>✕</button>
        </div>
        {sorted.length === 0 ? (
          <div style={{ fontFamily: T.sans, fontSize: 13, color: T.ink3, padding: '24px 0' }}>No {bucket.toLowerCase()} entries recorded for this week.</div>
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: T.sans, fontSize: 12.5 }}>
            <thead>
              <tr style={{ borderBottom: `1px solid ${T.rule}` }}>
                {cols.map((h, i) =>
                  <th key={i} style={{ textAlign: i < 2 ? 'left' : 'right', padding: '0 0 9px', fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase', color: T.ink3, fontWeight: 400 }}>{h}</th>
                )}
              </tr>
            </thead>
            <tbody>
              {sorted.map((r, i) =>
                <tr key={i} style={{ borderBottom: `1px solid ${T.ruleLight}` }}>
                  <td style={{ padding: '9px 0', color: T.ink }}>{(window.CAMPUS_LABEL && window.CAMPUS_LABEL[r.campus]) || r.campus}</td>
                  <td style={{ padding: '9px 8px 9px 0', fontFamily: T.display, fontStyle: 'italic', color: T.ink2 }}>{window.serviceLabel(r)}</td>
                  <td style={{ padding: '9px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: T.ink2 }}>{r.main == null ? '—' : window.fmtFull(r.main)}</td>
                  <td style={{ padding: '9px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: T.ink2 }}>{r.fk == null ? '—' : window.fmtFull(r.fk)}</td>
                  {hasMs && <td style={{ padding: '9px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums', color: T.ink2 }}>
                    {r.ms == null ? '—' : window.fmtFull(r.ms)}
                    {r.msMiddle != null && <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '.04em', color: T.ink3, marginTop: 2 }}>High {window.fmtFull(r.msHigh || 0)} · Mid {window.fmtFull(r.msMiddle)}</div>}
                  </td>}
                  <td style={{ padding: '9px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums', fontWeight: 600, color: T.ink }}>{window.fmtFull(r.total)}</td>
                </tr>
              )}
              <tr style={{ borderTop: `2px solid ${T.ink}`, fontWeight: 600 }}>
                <td style={{ padding: '11px 0' }}>All campuses</td>
                <td></td>
                <td style={{ padding: '11px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(sum('main'))}</td>
                <td style={{ padding: '11px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(sum('fk'))}</td>
                {hasMs && <td style={{ padding: '11px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(sum('ms'))}</td>}
                <td style={{ padding: '11px 0', textAlign: 'right', fontFamily: T.display, fontSize: 17 }}>{window.fmtFull(sum('total'))}</td>
              </tr>
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

<script type="text/babel">
// mobile-view.jsx — Faith Church · Leadership Brief (mobile)
// Same data + same warm aesthetic as desktop, restructured for a phone.
// Tabs live at the bottom; week navigation is by swipe; share copies a text summary.

const MM_THEME = {
  paper: '#f7f1e6',
  card: '#fbf6ec',
  cardAlt: '#f3ede0',
  rule: 'rgba(60,40,25,0.18)',
  ruleLight: 'rgba(60,40,25,0.10)',
  ink: '#231811',
  ink2: 'rgba(35,24,17,0.72)',
  ink3: 'rgba(35,24,17,0.52)',
  wine: '#7d3a35',
  clay: '#b87a4f',
  sage: '#6e8a6c',
  gold: '#a68534',
  good: '#5d7a4f',
  bad: '#a23a2e',
  display: '"Spectral", "Times New Roman", serif',
  sans: '"Hanken Grotesk", -apple-system, system-ui, sans-serif',
  mono: '"JetBrains Mono", "SF Mono", monospace'
};

function MobileView({ onAddEntry, onDataChange, onEditRecord }) {
  const T = MM_THEME;
  const ALL = window.ATTENDANCE;
  const TODAY = new Date();
  const k = window.agg.kpis(ALL, TODAY);
  const completed = k.completedWeeks;

  const [tab, setTab] = React.useState('overview');
  const [weekIdx, setWeekIdx] = React.useState(completed.length - 1); // index into completed[]
  const [sheet, setSheet] = React.useState(null); // {kind:'campus'|'service', payload}
  const [refreshing, setRefreshing] = React.useState(false);
  const [pullY, setPullY] = React.useState(0);
  const [toast, setToast] = React.useState(null);

  const scrollRef = React.useRef(null);
  const touchStart = React.useRef(null);

  // Pull-to-refresh + horizontal swipe
  const onTouchStart = (e) => {
    const t = e.touches[0];
    touchStart.current = { x: t.clientX, y: t.clientY, scrollTop: scrollRef.current?.scrollTop || 0 };
  };
  const onTouchMove = (e) => {
    if (!touchStart.current) return;
    const t = e.touches[0];
    const dy = t.clientY - touchStart.current.y;
    if (touchStart.current.scrollTop <= 0 && dy > 0 && tab === 'overview') {
      setPullY(Math.min(80, dy * 0.55));
    }
  };
  const onTouchEnd = (e) => {
    if (!touchStart.current) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.current.x;
    const dy = t.clientY - touchStart.current.y;

    // pull-to-refresh
    if (pullY > 55) {
      window.mergeAttendance();
      if (onDataChange) onDataChange();
      setRefreshing(true);
      setPullY(40);
      setTimeout(() => { setRefreshing(false); setPullY(0); showToast('Refreshed · ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })); }, 850);
    } else {
      setPullY(0);
    }

    // horizontal swipe to change week (only on overview, only if mostly horizontal)
    if (tab === 'overview' && Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.6) {
      if (dx < 0 && weekIdx < completed.length - 1) setWeekIdx((i) => i + 1);
      else if (dx > 0 && weekIdx > 0) setWeekIdx((i) => i - 1);
    }
    touchStart.current = null;
  };

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 1800);
  }

  function shareSummary() {
    const w = completed[weekIdx];
    if (!w) return;
    const prev = weekIdx > 0 ? completed[weekIdx - 1] : null;
    const wow = prev ? ((w.total - prev.total) / prev.total * 100) : null;
    const rows = ALL.filter((r) => r.weekOf === w.weekOf);
    const byCampus = window.CAMPUSES.map((c) => {
      const total = rows.filter((r) => r.campus === c).reduce((s, r) => s + (r.total || 0), 0);
      return { c, total };
    }).filter((x) => x.total > 0).sort((a, b) => b.total - a.total);

    const txt = [
      `Faith Church · Week of ${w.weekOf}`,
      `Total: ${window.fmtFull(w.total)}` + (wow != null ? `  (${wow >= 0 ? '+' : ''}${wow.toFixed(1)}%, ${(w.total - prev.total) >= 0 ? '+' : ''}${Math.round(w.total - prev.total).toLocaleString()} vs last wk)` : ''),
      `Main ${window.fmtFull(w.main)} · FaithKids ${window.fmtFull(w.fk)} · Mainstream ${window.fmtFull(w.ms)}`,
      '',
      'By campus:',
      ...byCampus.map((x) => `  ${x.c.padEnd(5)} ${window.fmtFull(x.total)}`)
    ].join('\n');

    if (navigator.share) {
      navigator.share({ title: 'Faith Church · weekly attendance', text: txt }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(txt).then(() => showToast('Copied summary to clipboard')).catch(() => showToast('Copy failed'));
    } else {
      showToast('Sharing not supported');
    }
  }

  return (
    <div style={{
      width: '100%', height: '100%', background: T.paper, color: T.ink,
      fontFamily: T.sans, display: 'flex', flexDirection: 'column', overflow: 'hidden',
      position: 'relative'
    }}>
      <MobileHeader T={T} tab={tab} onShare={shareSummary} weekLabel={completed[weekIdx]?.weekOf} onAddEntry={onAddEntry} />

      {/* Pull indicator */}
      <div style={{
        height: pullY, transition: touchStart.current ? 'none' : 'height .22s ease',
        display: 'flex', alignItems: 'flex-end', justifyContent: 'center',
        overflow: 'hidden', color: T.ink3, fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', paddingBottom: 4
      }}>
        {refreshing ? <Spinner T={T} label="Refreshing" /> : pullY > 55 ? 'Release to refresh' : pullY > 10 ? 'Pull to refresh' : ''}
      </div>

      <div ref={scrollRef}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{ flex: 1, overflow: 'auto', WebkitOverflowScrolling: 'touch' }}>
        {tab === 'overview' && <MOverview T={T} completed={completed} weekIdx={weekIdx} setWeekIdx={setWeekIdx} ALL={ALL} k={k} onOpenCampus={(c) => setSheet({ kind: 'campus', payload: c })} onOpenService={(r) => setSheet({ kind: 'service', payload: r })} onOpenBucket={(payload) => setSheet({ kind: 'bucket', payload })} />}
        {tab === 'trends' && <MTrends T={T} k={k} />}
        {tab === 'campuses' && <MCampuses T={T} ALL={ALL} TODAY={TODAY} onOpenCampus={(c) => setSheet({ kind: 'campus', payload: c })} />}
        {tab === 'events' && <window.MEventsTab T={T} onDataChange={onDataChange} />}
        {tab === 'records' && <MRecords T={T} ALL={ALL} onOpenService={(r) => setSheet({ kind: 'service', payload: r })} onEditRecord={onEditRecord} />}
      </div>

      <MobileTabs T={T} tab={tab} onChange={setTab} />

      {sheet?.kind === 'service' && <ServiceSheet T={T} record={sheet.payload} onClose={() => setSheet(null)} onDataChange={onDataChange} />}
      {sheet?.kind === 'campus' && <CampusSheet T={T} campus={sheet.payload} onClose={() => setSheet(null)} weekOf={completed[weekIdx]?.weekOf} />}
      {sheet?.kind === 'bucket' && <BucketSheet T={T} bucket={sheet.payload.bucket} rows={sheet.payload.rows} weekOf={sheet.payload.weekOf} onClose={() => setSheet(null)} />}

      {toast && (
        <div style={{
          position: 'absolute', left: '50%', bottom: 96, transform: 'translateX(-50%)',
          background: T.ink, color: T.paper, padding: '10px 16px', borderRadius: 999,
          fontSize: 12.5, fontFamily: T.sans, fontWeight: 500, letterSpacing: 0.1,
          boxShadow: '0 8px 30px rgba(0,0,0,.25)', zIndex: 50, whiteSpace: 'nowrap'
        }}>{toast}</div>
      )}
    </div>
  );
}

// ============= OVERVIEW =============
function MOverview({ T, completed, weekIdx, setWeekIdx, ALL, k, onOpenCampus, onOpenService, onOpenBucket }) {
  const w = completed[weekIdx];
  if (!w) return <div style={{ padding: 30, color: T.ink3 }}>No completed weeks of data.</div>;
  const prev = weekIdx > 0 ? completed[weekIdx - 1] : null;
  const wow = prev ? (w.total - prev.total) / prev.total * 100 : null;
  const lastYearTotal = window.agg.sameWeekLastYear(ALL, w.weekOf);
  const yoy = lastYearTotal ? (w.total - lastYearTotal) / lastYearTotal * 100 : null;
  const _ytdYr = parseInt(w.weekOf.slice(0, 4));
  const _cWks = completed.filter(wk => parseInt(wk.weekOf.slice(0, 4)) === _ytdYr && wk.weekOf <= w.weekOf);
  const _ytdN = _cWks.length;
  const ytdAvg = _ytdN > 0 ? _cWks.reduce((s, wk) => s + wk.total, 0) / _ytdN : null;
  const _pWks = completed.filter(wk => parseInt(wk.weekOf.slice(0, 4)) === _ytdYr - 1).slice(0, _ytdN);
  const lyYtdAvg = _pWks.length > 0 ? _pWks.reduce((s, wk) => s + wk.total, 0) / _pWks.length : null;
  const ytdDelta = ytdAvg && lyYtdAvg ? (ytdAvg - lyYtdAvg) / lyYtdAvg * 100 : null;

  const wkRows = ALL.filter((r) => r.weekOf === w.weekOf);
  const prevRows = prev ? ALL.filter((r) => r.weekOf === prev.weekOf) : [];
  const campusCards = window.CAMPUSES.map((c) => {
    const cur = wkRows.filter((r) => r.campus === c).reduce((s, r) => s + (r.total || 0), 0);
    const prv = prevRows.filter((r) => r.campus === c).reduce((s, r) => s + (r.total || 0), 0);
    const delta = prv ? (cur - prv) / prv * 100 : null;
    return { campus: c, cur, prv, delta };
  }).filter((c) => c.cur > 0).sort((a, b) => b.cur - a.cur);

  const last8 = completed.slice(Math.max(0, weekIdx - 7), weekIdx + 1);
  const sundayRows = wkRows.filter(r => window.bucketOf(r) === 'Sunday' && !r.excludeFromWeekly);
  const midweekRows = wkRows.filter(r => window.bucketOf(r) === 'Midweek' && !r.excludeFromWeekly);
  const sundayTotal = sundayRows.reduce((s,r) => s+(r.total||0), 0);
  const midweekTotal = midweekRows.reduce((s,r) => s+(r.total||0), 0);

  return (
    <div style={{ padding: '14px 16px 24px' }}>
      {/* Week pager */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
        <button disabled={weekIdx <= 0} onClick={() => setWeekIdx((i) => Math.max(0, i - 1))} style={pagerBtn(T, weekIdx <= 0)} aria-label="Previous week">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6" /></svg>
        </button>
        <div style={{ textAlign: 'center', flex: 1 }}>
          <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '.2em', color: T.ink3, textTransform: 'uppercase' }}>
            {weekIdx === completed.length - 1 ? 'Most recent week' : `${completed.length - 1 - weekIdx} weeks ago`}
          </div>
          <div style={{ fontFamily: T.display, fontSize: 15, fontStyle: 'italic', color: T.ink2, marginTop: 1 }}>Week of {w.weekOf}</div>
        </div>
        <button disabled={weekIdx >= completed.length - 1} onClick={() => setWeekIdx((i) => Math.min(completed.length - 1, i + 1))} style={pagerBtn(T, weekIdx >= completed.length - 1)} aria-label="Next week">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6" /></svg>
        </button>
      </div>

      {/* Hero card */}
      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: 22, marginBottom: 14 }}>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 6 }}>Network total</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 14 }}>
          <div style={{ fontFamily: T.display, fontSize: 64, fontWeight: 500, lineHeight: .9, letterSpacing: '-0.025em', fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(w.total)}</div>
          <div style={{ fontFamily: T.display, fontSize: 13, fontStyle: 'italic', color: T.ink2 }}>attended</div>
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 14, fontFamily: T.sans, fontSize: 12, color: T.ink2, paddingTop: 12, borderTop: `1px solid ${T.ruleLight}` }}>
          <MBullet T={T} label="Main" value={w.main} color={T.wine} />
          <MBullet T={T} label="FaithKids" value={w.fk} color={T.clay} />
          <MBullet T={T} label="Mainstream" value={w.ms} color={T.sage} />
        </div>
      </div>

      {/* Two delta cards */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
        <MDelta T={T} label="vs last week" delta={wow} cur={w.total} prevN={prev?.total} />
        <MDelta T={T} label="YTD avg vs last yr" delta={ytdDelta} cur={ytdAvg ? Math.round(ytdAvg) : w.total} prevN={lyYtdAvg ? Math.round(lyYtdAvg) : null} />
      </div>

      {(sundayTotal > 0 || midweekTotal > 0) && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
          <div onClick={() => onOpenBucket({ bucket: 'Sunday', rows: sundayRows, weekOf: w.weekOf })} style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: '14px 16px', cursor: 'pointer' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
              <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '.18em', textTransform: 'uppercase', color: T.ink3 }}>Sunday</div>
              <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.1em', textTransform: 'uppercase', color: T.wine }}>Details ›</div>
            </div>
            <div style={{ fontFamily: T.display, fontSize: 30, fontWeight: 500, lineHeight: .95, fontVariantNumeric: 'tabular-nums', marginBottom: 8 }}>{window.fmtFull(sundayTotal)}</div>
            <div style={{ fontFamily: T.sans, fontSize: 11, color: T.ink2 }}>{window.fmtFull(sundayRows.reduce((s,r)=>s+(r.main||0),0))} main · {window.fmtFull(sundayRows.reduce((s,r)=>s+(r.fk||0),0))} kids{sundayRows.reduce((s,r)=>s+(r.ms||0),0) > 0 ? ` · ${window.fmtFull(sundayRows.reduce((s,r)=>s+(r.ms||0),0))} ms` : ''}</div>
          </div>
          <div onClick={() => onOpenBucket({ bucket: 'Midweek', rows: midweekRows, weekOf: w.weekOf })} style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: '14px 16px', cursor: 'pointer' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
              <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '.18em', textTransform: 'uppercase', color: T.ink3 }}>Midweek</div>
              <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.1em', textTransform: 'uppercase', color: T.wine }}>Details ›</div>
            </div>
            <div style={{ fontFamily: T.display, fontSize: 30, fontWeight: 500, lineHeight: .95, fontVariantNumeric: 'tabular-nums', marginBottom: 8 }}>{window.fmtFull(midweekTotal)}</div>
            <div style={{ fontFamily: T.sans, fontSize: 11, color: T.ink2 }}>{window.fmtFull(midweekRows.reduce((s,r)=>s+(r.main||0),0))} main · {window.fmtFull(midweekRows.reduce((s,r)=>s+(r.ms||0),0))} ms</div>
          </div>
        </div>
      )}

      {(() => {
        const seen = new Set(); const evCards = [];
        wkRows.forEach(r => {
          if (r.eventId && !seen.has(r.eventId)) {
            seen.add(r.eventId);
            const evRows = wkRows.filter(x => x.eventId === r.eventId);
            const total = evRows.reduce((s, x) => s + (x.total || 0), 0);
            const yr = parseInt(w.weekOf.slice(0, 4));
            const lyRows = ALL.filter(x => x.eventId === r.eventId && x.year === yr - 1);
            const lastYearTotal = lyRows.length ? lyRows.reduce((s, x) => s + (x.total || 0), 0) : null;
            evCards.push({ eventId: r.eventId, eventName: r.eventName, total, lastYearTotal });
          }
        });
        return evCards.length > 0 ? (
          <div style={{ marginBottom: 14 }}>
            {evCards.map(ev => <window.MEventHighlightCard key={ev.eventId} T={T} ev={ev} />)}
          </div>
        ) : null;
      })()}

      {/* Campuses */}
      <div style={{ marginBottom: 18 }}>
        <SectionTitle T={T} eyebrow="By campus · this week" title="How each location did" />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {campusCards.map((c) => <MCampusRow key={c.campus} T={T} c={c} onTap={() => onOpenCampus(c.campus)} />)}
        </div>
      </div>

      {/* Trailing 8 weeks */}
      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: 16, marginBottom: 18 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
          <div>
            <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.18em', color: T.ink3, textTransform: 'uppercase' }}>Trailing 8 weeks</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: T.display, fontSize: 19, fontWeight: 500, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{window.fmtFull(Math.round(last8.reduce((s, x) => s + x.total, 0) / Math.max(1, last8.length)))}</div>
            <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.16em', color: T.ink3, textTransform: 'uppercase', marginTop: 2 }}>avg / week</div>
          </div>
        </div>
        <window.LineChart
          width={340} height={120}
          series={[{ name: 'Total', color: T.wine, values: last8.map((x) => x.total) }]}
          xLabels={last8.map((x) => x.weekOf.slice(5))}
          fill={true} colors={[T.wine]}
          padding={{ t: 8, r: 8, b: 22, l: 38 }}
          gridColor={T.ruleLight} textColor={T.ink3} showDots={true}
        />
      </div>

      {/* Services this week — grouped by campus → midweek + sunday */}
      <div>
        <SectionTitle T={T} eyebrow="Services this week" title="By campus" hint="Tap to expand" />
        <MCampusBuckets T={T} rows={wkRows} onOpenService={onOpenService} />
      </div>

      {/* Swipe hint */}
      <div style={{ textAlign: 'center', marginTop: 22, fontFamily: T.display, fontStyle: 'italic', fontSize: 12, color: T.ink3 }}>
        Swipe ← → to change weeks
      </div>
    </div>
  );
}

function pagerBtn(T, disabled) {
  return {
    width: 36, height: 36, borderRadius: 999, border: `1px solid ${T.rule}`,
    background: disabled ? 'transparent' : T.card, color: disabled ? T.ink3 : T.ink,
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    cursor: disabled ? 'default' : 'pointer', opacity: disabled ? 0.4 : 1
  };
}

function SectionTitle({ T, eyebrow, title, hint }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
      <div>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.18em', color: T.ink3, textTransform: 'uppercase' }}>{eyebrow}</div>
        <h3 style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>{title}</h3>
      </div>
      {hint && <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 11.5, color: T.ink3 }}>{hint}</div>}
    </div>
  );
}

function MBullet({ T, label, value, color }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
      <span style={{ width: 7, height: 7, borderRadius: '50%', background: color, display: 'inline-block' }} />
      <span style={{ color: T.ink3, fontFamily: T.mono, fontSize: 9, letterSpacing: '.1em', textTransform: 'uppercase' }}>{label}</span>
      <span style={{ fontFamily: T.display, fontSize: 16, fontWeight: 500, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>{value == null ? '—' : window.fmtFull(value)}</span>
    </div>
  );
}

function MDelta({ T, label, delta, cur, prevN }) {
  const has = delta != null && !isNaN(delta);
  const good = has && delta >= 0;
  const tone = !has ? T.ink3 : good ? T.good : T.bad;
  const arrow = !has ? '·' : good ? '↑' : '↓';
  const diff = has ? cur - prevN : null;
  return (
    <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: 14, position: 'relative', overflow: 'hidden', minHeight: 110 }}>
      <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: has ? tone : 'transparent' }} />
      <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 6 }}>{label}</div>
      <div style={{ fontFamily: T.display, fontSize: 30, fontWeight: 500, color: tone, lineHeight: .95, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>
        {arrow} {has ? Math.abs(delta).toFixed(1) + '%' : '—'}
      </div>
      <div style={{ fontFamily: T.display, fontSize: 12, fontStyle: 'italic', color: T.ink2, marginTop: 6 }}>
        {has ? `${good ? '+' : '−'}${window.fmtFull(Math.abs(diff))} ${good ? 'more' : 'fewer'}` : 'Not enough data'}
      </div>
    </div>
  );
}

function MCampusRow({ T, c, onTap }) {
  const has = c.delta != null && !isNaN(c.delta);
  const good = has && c.delta >= 0;
  const tone = !has ? T.ink3 : good ? T.good : T.bad;
  const fullName = window.CAMPUS_LABEL?.[c.campus] || c.campus;
  return (
    <button onClick={onTap} style={{
      display: 'grid', gridTemplateColumns: '1fr auto auto', gap: 10, alignItems: 'center',
      padding: '12px 14px', borderRadius: 8, background: T.card, border: `1px solid ${T.rule}`,
      cursor: 'pointer', textAlign: 'left', color: T.ink, fontFamily: T.sans
    }}>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 14, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{fullName}</div>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3, letterSpacing: '.06em', marginTop: 1 }}>{c.campus}</div>
      </div>
      <div style={{ textAlign: 'right' }}>
        <div style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{window.fmtFull(c.cur)}</div>
        {has ? (
          <div style={{ fontVariantNumeric: 'tabular-nums' }}>
            <div style={{ fontFamily: T.mono, fontSize: 10, color: tone, fontWeight: 600, marginTop: 3 }}>{good ? '↑' : '↓'} {Math.abs(c.delta).toFixed(0)}%</div>
            {c.prv ? <div style={{ fontFamily: T.mono, fontSize: 9.5, color: tone, fontWeight: 600 }}>{(c.cur - c.prv >= 0 ? '+' : '') + Math.round(c.cur - c.prv).toLocaleString()}</div> : null}
          </div>
        ) : <div style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, marginTop: 3 }}>—</div>}
      </div>
      <svg width="10" height="14" viewBox="0 0 8 14" style={{ color: T.ink3 }}><path d="M1 1l6 6-6 6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
    </button>
  );
}

function MServiceRow({ T, r, onTap }) {
  return (
    <button onClick={onTap} style={{
      display: 'grid', gridTemplateColumns: 'auto 1fr auto auto', gap: 10, alignItems: 'center',
      padding: '11px 14px', borderRadius: 8, background: T.card, border: `1px solid ${T.rule}`,
      cursor: 'pointer', textAlign: 'left', color: T.ink, fontFamily: T.sans
    }}>
      <div style={{ fontFamily: T.mono, fontSize: 10.5, color: T.ink3, letterSpacing: '.04em', minWidth: 44 }}>{r.date.slice(5)}</div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>{r.campus}</div>
        <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 12.5, color: T.ink2, marginTop: 1 }}>{window.serviceLabel(r)}</div>
        {r.eventName && <div style={{ fontFamily: T.sans, fontStyle: 'normal', fontSize: 10, color: r.excludeFromWeekly ? T.gold : T.wine, marginTop: 2, fontWeight: 600, letterSpacing: '.03em' }}>{r.eventName}</div>}
      </div>
      <div style={{ textAlign: 'right', fontFamily: T.display, fontSize: 16, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(r.total)}</div>
      <svg width="9" height="13" viewBox="0 0 8 14" style={{ color: T.ink3 }}><path d="M1 1l6 6-6 6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>
    </button>
  );
}

function MCampusBuckets({ T, rows, onOpenService }) {
  const groups = window.groupCampusBuckets(rows);
  // Start fully collapsed — leaders tap a campus/bucket to drill in
  const [expanded, setExpanded] = React.useState({});
  const toggle = (k) => setExpanded((s) => ({ ...s, [k]: !s[k] }));
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {groups.map((g) => {
        const buckets = ['Midweek', 'Sunday', 'Other'].filter((b) => g[b].rows.length);
        if (!buckets.length) return null;

                      </span>
                      <span style={{ textAlign: 'right', fontFamily: T.display, fontSize: 17, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(bk.total)}</span>

                    </button>
                    {isOpen && (
                      <div style={{ padding: '4px 14px 12px', display: 'flex', flexDirection: 'column', gap: 4 }}>
                        {bk.rows.map((r, i) => (
                          <button key={i} onClick={() => onOpenService(r)} style={{
                            display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 10, alignItems: 'center',
                            padding: '8px 10px', borderRadius: 6, background: '#fbf6ec', border: `1px solid ${T.ruleLight}`,
                            cursor: 'pointer', textAlign: 'left', color: T.ink, fontFamily: T.sans
                          }}>
                            <span style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, minWidth: 36 }}>{r.date.slice(5)}</span>
                            <span style={{ minWidth: 0 }}>
                              <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 13, color: T.ink2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{window.serviceLabel(r)}</div>
                              <div style={{ fontFamily: T.mono, fontSize: 9, color: T.ink3, letterSpacing: '.06em', marginTop: 1 }}>
                                {r.main ? `Main ${r.main}` : ''}{r.fk ? ` · FK ${r.fk}` : ''}{r.ms ? ` · MS ${r.ms}` : ''}

                            <span style={{ textAlign: 'right', fontFamily: T.display, fontSize: 15, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(r.total)}</span>

                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============= TRENDS =============
function MTrends({ T }) {
  const ALL = window.ATTENDANCE;
  const TODAY = new Date();

  const allYears = [...new Set(ALL.map(r => r.year))].sort((a, b) => b - a);
  const curYear = allYears[0] || TODAY.getFullYear();

  const YEAR_COLORS = [T.wine, T.clay, T.sage, T.gold, T.rose, T.ink2];
  const yearColor = (yr) => YEAR_COLORS[allYears.indexOf(yr) % YEAR_COLORS.length];

  const [metric, setMetric] = React.useState('total');
  const [campus, setCampus] = React.useState('all');
  const [activeYears, setActiveYears] = React.useState(() => allYears.slice(0, 2));

  const toggleYear = (yr) =>
    setActiveYears(prev => prev.includes(yr)
      ? (prev.length > 1 ? prev.filter(y => y !== yr) : prev)
      : [...prev, yr]);

  const metricVal = (w) =>
    metric === 'main' ? (w.main || 0)
    : metric === 'fk'  ? (w.fk  || 0)
    : metric === 'ms'  ? (w.ms  || 0)
    : w.total;

  const weekMap = React.useMemo(() => {
    const rows = campus === 'all' ? ALL : ALL.filter(r => r.campus === campus);
    const weeks = window.agg.byWeek(rows.filter(r => !r.excludeFromWeekly));
    const map = {};
    weeks.forEach(w => {
      if (!window.agg.isCompleteWeek(w.weekOf, TODAY)) return;
      const yr = parseInt(w.weekOf.slice(0, 4));
      const wk = window.agg.isoWeek(w.weekOf);
      if (!map[yr]) map[yr] = {};
      map[yr][wk] = metricVal(w);
    });
    return map;
  }, [campus, metric]);

  const xPositions = Array.from({ length: 52 }, (_, i) => i + 1);
  const MONTH_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const xLabels = xPositions.map((wk, i) => {
    const mo = Math.min(Math.floor((wk - 1) * 12 / 52), 11);
    const prev = i > 0 ? Math.min(Math.floor((xPositions[i-1] - 1) * 12 / 52), 11) : -1;
    return mo !== prev ? MONTH_LABELS[mo] : '';
  });

  const series = [...activeYears].sort((a, b) => a - b).map(yr => ({
    name: String(yr),
    color: yearColor(yr),
    stroke: yr === curYear ? 2.2 : 1.5,
    values: xPositions.map(wk => (weekMap[yr] || {})[wk] ?? null),
  }));

  const curData   = weekMap[curYear]     || {};
  const priorData = weekMap[curYear - 1] || {};
  const curWeeks  = Object.keys(curData).map(Number).sort((a, b) => a - b);
  const latestWk  = curWeeks[curWeeks.length - 1];
  const thisVal      = latestWk ? (curData[latestWk] ?? null)   : null;
  const priorSameVal = latestWk ? (priorData[latestWk] ?? null) : null;
  const ytdAvg = curWeeks.length
    ? Math.round(curWeeks.reduce((s, w) => s + curData[w], 0) / curWeeks.length) : null;
  const priorYtdWks = Object.keys(priorData).map(Number).sort((a,b)=>a-b).slice(0, curWeeks.length);
  const priorYtdAvg = priorYtdWks.length
    ? Math.round(priorYtdWks.reduce((s,w) => s + priorData[w], 0) / priorYtdWks.length) : null;

  const pct  = (c, p) => p ? (c - p) / p * 100 : null;
  const fmtN = (n) => n != null ? n.toLocaleString() : '—';
  const fmtP = (d) => d == null ? '—' : (d >= 0 ? '+' : '') + d.toFixed(1) + '%';

  const METRICS = [
    { id: 'total', label: 'Total' },
    { id: 'main',  label: 'Main' },
    { id: 'fk',    label: 'FaithKids' },
    { id: 'ms',    label: 'Mainstream' },
  ];

  const MPill = ({ active, onClick, children, color }) => (
    <button onClick={onClick} style={{
      padding: '6px 11px', borderRadius: 999,
      border: `1px solid ${active ? (color || T.wine) : T.rule}`,
      background: active ? (color || T.wine) : 'transparent',
      color: active ? '#fbf6ec' : T.ink2,
      fontFamily: T.sans, fontSize: 11, fontWeight: 500, cursor: 'pointer', flexShrink: 0,
    }}>{children}</button>
  );

  const wowDelta = pct(thisVal, priorSameVal);
  const ytdDelta = pct(ytdAvg, priorYtdAvg);
  const metricLabel = METRICS.find(m => m.id === metric)?.label || 'Total';

  return (
    <div style={{ padding: '14px 16px 24px' }}>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', color: T.ink3, textTransform: 'uppercase' }}>Trends</div>
        <h2 style={{ fontFamily: T.display, fontSize: 22, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>Year over year</h2>
      </div>

      <div style={{ marginBottom: 10 }}>
        <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.14em', textTransform: 'uppercase', color: T.ink3, marginBottom: 6 }}>Measure</div>
        <div style={{ display: 'flex', gap: 5, overflowX: 'auto', paddingBottom: 2 }}>
          {METRICS.map(m => <MPill key={m.id} active={metric === m.id} onClick={() => setMetric(m.id)}>{m.label}</MPill>)}
        </div>
      </div>

      <div style={{ marginBottom: 10 }}>
        <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.14em', textTransform: 'uppercase', color: T.ink3, marginBottom: 6 }}>Campus</div>
        <div style={{ display: 'flex', gap: 5, overflowX: 'auto', paddingBottom: 2 }}>
          <MPill active={campus === 'all'} onClick={() => setCampus('all')}>All</MPill>
          {window.CAMPUSES.map(c => <MPill key={c} active={campus === c} onClick={() => setCampus(c)}>{c}</MPill>)}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.14em', textTransform: 'uppercase', color: T.ink3, marginBottom: 6 }}>Years</div>
        <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
          {allYears.map(yr => (
            <MPill key={yr} active={activeYears.includes(yr)} onClick={() => toggleYear(yr)} color={yearColor(yr)}>{yr}</MPill>
          ))}
        </div>
      </div>

      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: 14, marginBottom: 12 }}>
        <div style={{ marginBottom: 10 }}>
          <div style={{ fontFamily: T.display, fontSize: 14, fontWeight: 500 }}>{metricLabel} · {campus === 'all' ? 'All campuses' : campus}</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginTop: 6 }}>
            {series.map(s => (
              <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 5, fontFamily: T.sans, fontSize: 10.5, color: T.ink2 }}>
                <span style={{ display: 'inline-block', width: 14, height: 0, borderTop: `${s.stroke}px solid ${s.color}` }} />
                {s.name}
              </div>
            ))}
          </div>
        </div>
        <window.LineChart
          width={340} height={190} series={series} xLabels={xLabels} fill={false}
          padding={{ t: 8, r: 10, b: 26, l: 42 }}
          gridColor={T.ruleLight} textColor={T.ink3} showDots={false} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
        {[
          { label: 'Latest week', value: fmtN(thisVal), sub: latestWk ? `Wk ${latestWk}` : '—', delta: null },
          { label: `vs wk ${curYear-1}`, value: fmtP(wowDelta), sub: priorSameVal != null ? `Prev: ${fmtN(priorSameVal)}` : 'No data', delta: wowDelta },
          { label: `${curYear} YTD avg`, value: fmtN(ytdAvg), sub: `${curWeeks.length} wks`, delta: null },
          { label: `vs ${curYear-1} avg`, value: fmtP(ytdDelta), sub: priorYtdAvg != null ? `Prev: ${fmtN(priorYtdAvg)}` : 'No data', delta: ytdDelta },
        ].map(({ label, value, sub, delta }) => {
          const tone = delta == null ? T.ink : delta >= 0 ? T.good : T.bad;
          return (
            <div key={label} style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, padding: 12, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 3, background: delta == null ? 'transparent' : tone }} />
              <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.14em', textTransform: 'uppercase', color: T.ink3, marginBottom: 6 }}>{label}</div>
              <div style={{ fontFamily: T.display, fontSize: 20, fontWeight: 500, color: tone, fontVariantNumeric: 'tabular-nums', lineHeight: 1, marginBottom: 4 }}>{value}</div>
              <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3 }}>{sub}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============= CAMPUSES =============
function MCampuses({ T, ALL, TODAY, onOpenCampus }) {
  const cards = window.CAMPUSES.map((c) => {
    const rows = ALL.filter((r) => r.campus === c);
    if (!rows.length) return null;
    const ck = window.agg.kpis(rows, TODAY);
    return ck.completedWeeks.length ? { campus: c, k: ck, rows } : null;
  }).filter(Boolean).sort((a, b) => b.k.allTimeTotal - a.k.allTimeTotal);

  return (
    <div style={{ padding: '14px 16px 24px' }}>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', color: T.ink3, textTransform: 'uppercase' }}>All campuses</div>
        <h2 style={{ fontFamily: T.display, fontSize: 22, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>Across the network</h2>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {cards.map((card) => <MCampusCard key={card.campus} T={T} c={card.campus} k={card.k} rows={card.rows} onTap={() => onOpenCampus(card.campus)} />)}
      </div>
    </div>
  );
}

function MCampusCard({ T, c, k, rows, onTap }) {
  const fullName = window.CAMPUS_LABEL?.[c] || c;
  const sub = window.CAMPUS_SUB?.[c];
  const latest = k.latestWeek;
  const prev = k.prevWeek;
  const wow = latest && prev ? (latest.total - prev.total) / prev.total * 100 : null;
  const wowAbs = latest && prev ? latest.total - prev.total : null;
  const lastY = latest ? window.agg.sameWeekLastYear(rows, latest.weekOf) : null;
  const yoy = latest && lastY ? (latest.total - lastY) / lastY * 100 : null;
  const yoyAbs = latest && lastY ? latest.total - lastY : null;
  const recent = k.completedWeeks.slice(-12);
  const has = wow != null && !isNaN(wow);
  const good = has && wow >= 0;
  return (
    <button onClick={onTap} style={{
      background: T.card, border: `1px solid ${T.rule}`, borderRadius: 10, padding: 14,
      textAlign: 'left', color: T.ink, fontFamily: T.sans, cursor: 'pointer', width: '100%'
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10, marginBottom: 10 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontFamily: T.mono, fontSize: 10, color: T.wine, letterSpacing: '.1em', fontWeight: 600 }}>{c}</div>
          <h3 style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>{fullName}</h3>
          {sub && <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 11.5, color: T.ink3, marginTop: 2 }}>{sub}</div>}
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontFamily: T.display, fontSize: 24, fontWeight: 500, fontVariantNumeric: 'tabular-nums', lineHeight: 1 }}>{window.fmtFull(latest?.total || 0)}</div>
          <div style={{ fontFamily: T.mono, fontSize: 8.5, color: T.ink3, letterSpacing: '.16em', textTransform: 'uppercase', marginTop: 3 }}>This week</div>
        </div>
      </div>
      <window.LineChart
        width={320} height={60}
        series={[{ name: 'Total', color: T.wine, values: recent.map((w) => w.total) }]}
        xLabels={recent.map((w) => '')} fill={true} colors={[T.wine]}
        padding={{ t: 4, r: 4, b: 4, l: 4 }} gridColor="transparent" textColor="transparent" showDots={false}
      />
      <div style={{ display: 'flex', gap: 16, marginTop: 8, paddingTop: 8, borderTop: `1px solid ${T.ruleLight}` }}>
        <MiniStat T={T} label="vs last wk" value={has ? `${good ? '↑' : '↓'} ${Math.abs(wow).toFixed(0)}%` : '—'} tone={has ? (good ? T.good : T.bad) : T.ink3} sub={wowAbs != null ? (wowAbs >= 0 ? '+' : '') + Math.round(wowAbs).toLocaleString() : null} />
        <MiniStat T={T} label="vs last yr" value={yoy != null ? `${yoy >= 0 ? '↑' : '↓'} ${Math.abs(yoy).toFixed(0)}%` : '—'} tone={yoy != null ? (yoy >= 0 ? T.good : T.bad) : T.ink3} sub={yoyAbs != null ? (yoyAbs >= 0 ? '+' : '') + Math.round(yoyAbs).toLocaleString() : null} />
        <MiniStat T={T} label="avg / wk" value={window.fmtFull(k.avgWeek)} tone={T.ink} />
      </div>
    </button>
  );
}

function MiniStat({ T, label, value, tone, sub }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontFamily: T.mono, fontSize: 8.5, color: T.ink3, letterSpacing: '.16em', textTransform: 'uppercase' }}>{label}</div>
      <div style={{ fontFamily: T.display, fontSize: 14, fontWeight: 600, color: tone, marginTop: 2, fontVariantNumeric: 'tabular-nums' }}>{value}</div>
      {sub && <div style={{ fontFamily: T.mono, fontSize: 9, color: tone, fontVariantNumeric: 'tabular-nums', fontWeight: 600, marginTop: 1 }}>{sub}</div>}
    </div>
  );
}

// ============= RECORDS =============
function MRecords({ T, ALL, onOpenService, onEditRecord }) {
  const SERVICE_CATS_FILTERED = window.SERVICE_CATS.filter(c => c !== 'Special Event');
  const events = window.loadEventRegistry();
  const [campuses, setCampuses] = React.useState([]);
  const [cats, setCats] = React.useState([]);
  const [eventFilter, setEventFilter] = React.useState([]);
  const [fromDate, setFromDate] = React.useState('');
  const [toDate, setToDate] = React.useState('');
  const [search, setSearch] = React.useState('');

  const filtered = React.useMemo(() => {
    let r = ALL;
    if (campuses.length) r = r.filter((x) => campuses.includes(x.campus));
    if (cats.length) r = r.filter((x) => cats.includes(x.cat));
    if (eventFilter.length) r = r.filter((x) => eventFilter.includes(x.eventId));
    if (fromDate) r = r.filter((x) => x.date >= fromDate);
    if (toDate) r = r.filter((x) => x.date <= toDate);
    if (search) {
      const q = search.toLowerCase();
      r = r.filter((x) => x.date.includes(q) || x.cat.toLowerCase().includes(q) || x.campus.toLowerCase().includes(q));
    }
    return r.slice().sort((a, b) => a.date < b.date ? 1 : a.date > b.date ? -1 : 0);
  }, [campuses, cats, eventFilter, fromDate, toDate, search]);

  const MPill = ({ active, onClick, children }) => (
    <button onClick={onClick} style={{
      padding: '5px 10px', borderRadius: 999, border: `1px solid ${active ? T.wine : T.rule}`,
      background: active ? T.wine : 'transparent', color: active ? '#fbf6ec' : T.ink2,
      fontFamily: T.sans, fontSize: 10.5, fontWeight: 500, cursor: 'pointer'
    }}>{children}</button>
  );

  const inpSt = { height: 34, padding: '0 8px', background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, color: T.ink, fontFamily: T.sans, fontSize: 12, outline: 'none', flex: 1, minWidth: 0 };

  return (
    <div style={{ padding: '14px 16px 24px' }}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', color: T.ink3, textTransform: 'uppercase' }}>Records</div>
        <h2 style={{ fontFamily: T.display, fontSize: 22, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>Every service</h2>
      </div>
      <div style={{ position: 'relative', marginBottom: 10 }}>
        <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search date, campus, service…"
          style={{ width: '100%', padding: '10px 12px 10px 34px', background: T.card, border: `1px solid ${T.rule}`, borderRadius: 8, color: T.ink, fontFamily: T.sans, fontSize: 13, outline: 'none', boxSizing: 'border-box' }} />
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.ink3} strokeWidth="2" style={{ position: 'absolute', left: 12, top: 13 }}>
          <circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
      </div>

      {/* Date range */}
      <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginBottom: 10, flexWrap: 'wrap' }}>
        <span style={{ fontFamily: T.mono, fontSize: 9, color: T.ink3, letterSpacing: '.1em', textTransform: 'uppercase', flexShrink: 0 }}>Date</span>
        <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} style={inpSt} />
        <span style={{ fontFamily: T.sans, fontSize: 11, color: T.ink3, flexShrink: 0 }}>–</span>
        <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} style={inpSt} />
        {(fromDate || toDate) && (
          <button onClick={() => { setFromDate(''); setToDate(''); }} style={{ padding: '4px 8px', borderRadius: 4, border: `1px solid ${T.rule}`, background: 'transparent', color: T.ink3, fontFamily: T.mono, fontSize: 9.5, cursor: 'pointer', flexShrink: 0 }}>✕</button>
        )}
      </div>

      {/* Campus filter */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8 }}>
        {window.CAMPUSES.map((c) => (
          <MPill key={c} active={campuses.includes(c)} onClick={() => setCampuses((p) => p.includes(c) ? p.filter((x) => x !== c) : [...p, c])}>{c}</MPill>

      </div>

      {/* Service filter — no Special Event, Thursday Service = The Voice */}

          </MPill>
        ))}
      </div>

      {/* Event filter */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10, alignItems: 'center' }}>
        <span style={{ fontFamily: T.mono, fontSize: 8.5, color: T.ink3, letterSpacing: '.1em', textTransform: 'uppercase', flexShrink: 0 }}>Event</span>
        {events.map((ev) => (
          <MPill key={ev.id} active={eventFilter.includes(ev.id)} onClick={() => setEventFilter((p) => p.includes(ev.id) ? p.filter((x) => x !== ev.id) : [...p, ev.id])}>
            {ev.name}
          </MPill>
        ))}

      <div style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, letterSpacing: '.1em', marginBottom: 8 }}>
        {filtered.length.toLocaleString()} services · showing first {Math.min(80, filtered.length)}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {filtered.slice(0, 80).map((r, i) => (
          <div key={i} style={{ position: 'relative' }}>
            <MServiceRow T={T} r={r} onTap={() => onOpenService(r)} />

              position: 'absolute', top: 8, right: 38, background: 'rgba(247,241,230,0.9)',
              border: `1px solid ${T.rule}`, borderRadius: 4, cursor: 'pointer',
              color: T.ink2, fontSize: 12, padding: '3px 7px', lineHeight: 1,
            }}>✎</button>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============= SHEETS =============
function Sheet({ T, onClose, title, eyebrow, children }) {
  return (
    <div style={{ position: 'absolute', inset: 0, background: 'rgba(35,24,17,.45)', zIndex: 30, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', animation: 'mSheetFadeIn .18s ease' }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{

        boxShadow: '0 -16px 50px rgba(0,0,0,.25)', animation: 'mSheetUp .25s cubic-bezier(.2,.8,.2,1)'
      }}>
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 8 }}>
          <div style={{ width: 36, height: 4, borderRadius: 999, background: T.rule }} />

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', padding: '14px 18px 0', gap: 12 }}>

}

// Popup: every Sunday/Midweek entry that makes up the overview card, for the selected week.
function BucketSheet({ T, bucket, rows, weekOf, onClose }) {
  const sorted = [...(rows || [])].sort((a, b) => (b.total || 0) - (a.total || 0));
  const hasMs = sorted.some(r => (r.ms || 0) > 0);
  const sum = (k) => sorted.reduce((s, r) => s + (r[k] || 0), 0);
  return (
    <Sheet T={T} onClose={onClose} eyebrow={`${bucket} breakdown · all campuses`} title={`${window.fmtFull(sum('total'))} total`}>
      <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 13, color: T.ink2, marginBottom: 14 }}>Week of {weekOf} · {sorted.length} {sorted.length === 1 ? 'entry' : 'entries'}</div>
      {sorted.length === 0 ? (
        <div style={{ fontFamily: T.sans, fontSize: 13, color: T.ink3, padding: '8px 0' }}>No {bucket.toLowerCase()} entries recorded for this week.</div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {sorted.map((r, i) => (
            <div key={i} style={{ border: `1px solid ${T.rule}`, background: T.card, borderRadius: 8, padding: '11px 13px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600, color: T.ink }}>{(window.CAMPUS_LABEL && window.CAMPUS_LABEL[r.campus]) || r.campus}</div>
                  <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 12.5, color: T.ink2 }}>{window.serviceLabel(r)}</div>
                </div>
                <div style={{ fontFamily: T.display, fontSize: 22, fontWeight: 500, fontVariantNumeric: 'tabular-nums', flexShrink: 0 }}>{window.fmtFull(r.total)}</div>
              </div>
              <div style={{ fontFamily: T.sans, fontSize: 11, color: T.ink3, marginTop: 6 }}>
                {r.main == null ? '—' : window.fmtFull(r.main)} main · {r.fk == null ? '—' : window.fmtFull(r.fk)} kids{hasMs ? ` · ${r.ms == null ? '—' : window.fmtFull(r.ms)} ms` : ''}{r.msMiddle != null ? ` (High ${window.fmtFull(r.msHigh || 0)} · Mid ${window.fmtFull(r.msMiddle)})` : ''}
              </div>
            </div>
          ))}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', borderTop: `2px solid ${T.ink}`, marginTop: 4, paddingTop: 11 }}>
            <div style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600 }}>All campuses</div>
            <div style={{ fontFamily: T.display, fontSize: 20, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(sum('total'))}</div>
          </div>
        </div>
      )}
    </Sheet>
  );
}

function ServiceSheet({ T, record, onClose, onDataChange }) {
  const fullName = window.CAMPUS_LABEL?.[record.campus] || record.campus;
  const series = window.ATTENDANCE.filter((r) => r.campus === record.campus && r.cat === record.cat).sort((a, b) => a.date < b.date ? -1 : 1).slice(-12);
  const sibs = window.ATTENDANCE.filter((r) => r.date === record.date).sort((a, b) => a.campus < b.campus ? -1 : 1);
  const total = sibs.reduce((s, r) => s + (r.total || 0), 0);
  return (
    <Sheet T={T} onClose={onClose} eyebrow="Service detail" title={window.serviceLabel(record)}>
      <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 14, color: T.ink2, marginBottom: 14 }}>{fullName} · {record.date}</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 18 }}>
        <KV T={T} label="Total" value={record.total} big />
        <KV T={T} label="Main Service" value={record.main} />
        <KV T={T} label="FaithKids" value={record.fk} />
        {record.msHigh != null || record.msMiddle != null ? (
          <React.Fragment>
            <KV T={T} label="Mainstream High" value={record.msHigh} />
            <KV T={T} label="Mainstream Middle" value={record.msMiddle} />
          </React.Fragment>
        ) : (
          <KV T={T} label="Mainstream" value={record.ms} />
        )}
      </div>
      {series.length > 1 && (
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>Last 12 · {window.serviceLabel(record)} at {record.campus}</div>
          <window.LineChart
            width={320} height={120}
            series={[{ name: window.serviceLabel(record), values: series.map((s) => s.total), color: T.wine }]}
            xLabels={series.map((s) => s.date.slice(5))} fill={true} colors={[T.wine]}
            padding={{ t: 8, r: 6, b: 22, l: 36 }} gridColor={T.ruleLight} textColor={T.ink3}
          />
        </div>
      )}
      <div>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>Same date · all services</div>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: T.sans, fontSize: 12.5 }}>
          <tbody>
            {sibs.map((s, i) =>
              <tr key={i} style={{ borderBottom: `1px solid ${T.ruleLight}` }}>
                <td style={{ padding: '7px 0', color: s === record ? T.wine : T.ink2 }}>{s.campus}</td>
                <td style={{ padding: '7px 0', fontStyle: 'italic', fontFamily: T.display, color: s === record ? T.wine : T.ink2 }}>{window.serviceLabel(s)}</td>
                <td style={{ padding: '7px 0', textAlign: 'right', fontVariantNumeric: 'tabular-nums', fontWeight: s === record ? 600 : 400, color: s === record ? T.wine : T.ink }}>{window.fmtFull(s.total)}</td>
              </tr>
            )}
            <tr style={{ borderTop: `2px solid ${T.ink}`, fontWeight: 600 }}>
              <td colSpan="2" style={{ padding: '9px 0' }}>All campuses</td>
              <td style={{ padding: '9px 0', textAlign: 'right', fontFamily: T.display, fontSize: 16 }}>{window.fmtFull(total)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <window.EventAssignPicker T={T} record={record} onDataChange={onDataChange} />
    </Sheet>
  );
}

function CampusSheet({ T, campus, weekOf, onClose }) {
  const fullName = window.CAMPUS_LABEL?.[campus] || campus;
  const sub = window.CAMPUS_SUB?.[campus];
  const rows = window.ATTENDANCE.filter((r) => r.campus === campus);
  const k = window.agg.kpis(rows, new Date());
  const recent = k.completedWeeks.slice(-26);
  const wkRows = rows.filter((r) => r.weekOf === weekOf).sort((a, b) => a.date < b.date ? -1 : 1);
  const wkTotal = wkRows.reduce((s, r) => s + (r.total || 0), 0);
  return (
    <Sheet T={T} onClose={onClose} eyebrow={campus + (sub ? ' · ' + sub : '')} title={fullName}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 16 }}>
        <KV T={T} label="This wk" value={wkTotal} big />
        <KV T={T} label="Avg / wk" value={k.avgWeek} />
        <KV T={T} label="All-time" value={k.allTimeTotal} />
      </div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>Last 26 weeks</div>
        <window.LineChart
          width={320} height={130}
          series={[{ name: 'Total', color: T.wine, values: recent.map((w) => w.total) }]}
          xLabels={recent.map((w) => w.weekOf.slice(5))} fill={true} colors={[T.wine]}
          padding={{ t: 8, r: 6, b: 22, l: 36 }} gridColor={T.ruleLight} textColor={T.ink3}
        />
      </div>
      {wkRows.length > 0 && (
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>Services · week of {weekOf}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {wkRows.map((r, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: 'auto 1fr auto', gap: 10, padding: '10px 12px', background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, alignItems: 'center' }}>
                <div style={{ fontFamily: T.mono, fontSize: 10.5, color: T.ink3 }}>{r.date.slice(5)}</div>
                <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 13 }}>{window.serviceLabel(r)}</div>
                <div style={{ fontFamily: T.display, fontSize: 15, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(r.total)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </Sheet>
  );
}

function KV({ T, label, value, big }) {
  return (
    <div style={{ padding: 12, border: `1px solid ${T.rule}`, background: T.card, borderRadius: 6 }}>
      <div style={{ fontFamily: T.mono, fontSize: 9, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>{label}</div>
      <div style={{ fontFamily: T.display, fontSize: big ? 26 : 18, fontWeight: 500, marginTop: 4, fontVariantNumeric: 'tabular-nums' }}>{value == null ? '—' : window.fmtFull(value)}</div>
    </div>
  );
}

window.MobileView = MobileView;

window.M_THEME = MM_THEME;
