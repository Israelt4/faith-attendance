// At CFC, "Wednesday - MM" (Mainstream Middle) is part of the same Wednesday
// night service as the "Wednesday Service" row (which already covers Main +
// FaithKids + Mainstream High). Merge MM into Wed Service so it appears as
// one row, with Mainstream Middle counts rolled into the Mainstream column.
(function mergeCFCWedMM() {
  const byDateCampus = new Map();
  const out = [];
  const mmByKey = new Map();
  for (const r of window.ATTENDANCE) {
    if (r.campus === 'CFC' && r.cat === 'Wednesday - MM') {
      mmByKey.set(r.date, r);
    } else {
      out.push(r);
    }
  }
  for (const r of out) {
    if (r.campus === 'CFC' && r.cat === 'Wednesday Service' && mmByKey.has(r.date)) {
      const mm = mmByKey.get(r.date);
      // The pre-merge "Wednesday Service" row at CFC = Mainstream HIGH (in ms)
      // + Main Service (main) + FaithKids (fk).
      // The MM row's count may live in ms or main — take whichever is present.
      const middle = (mm.ms || 0) + (mm.main || 0);
      r.msHigh   = r.ms || 0;
      r.msMiddle = middle;
      r.ms       = (r.ms || 0) + middle;
      // pick up any FaithKids / Main numbers on the MM row too
      r.fk   = (r.fk   || 0) + (mm.fk   || 0);
      r.total = (r.main || 0) + (r.fk || 0) + (r.ms || 0);
      mmByKey.delete(r.date);
    }
  }
  // any orphan MM rows (no matching Wed Service that day) → keep as Wed Service
  for (const [date, mm] of mmByKey) {
    const middle = (mm.ms || 0) + (mm.main || 0);
    mm.cat = 'Wednesday Service';
    mm.main = 0;
    mm.ms = middle;
    mm.msHigh = 0;
    mm.msMiddle = middle;
    mm.total = (mm.main || 0) + (mm.fk || 0) + (mm.ms || 0);
    out.push(mm);
  }
  out.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  window.ATTENDANCE = out;
})();

// Bucket a service into Midweek (Wed/Thu, incl. special events those days)
// or Sunday (Sunday services + special events on Sunday). Falls back to "Other".
window.bucketOf = function(r) {
  if (!r) return 'Other';
  const d = new Date(r.date + 'T00:00:00').getDay(); // 0=Sun, 3=Wed, 4=Thu
  if (d === 0) return 'Sunday';
  if (d === 3 || d === 4) return 'Midweek';
  return 'Other';
};

// Group rows by campus, then split into Midweek/Sunday buckets with rolled-up totals.
// Returns array sorted by campus size (largest first), unless campusOrder provided.
window.groupCampusBuckets = function(rows, campusOrder) {
  const mk = () => ({ rows: [], total: 0, main: 0, fk: 0, ms: 0 });
  const map = new Map();
  rows.forEach((r) => {
    if (!map.has(r.campus)) map.set(r.campus, { campus: r.campus, total: 0, Midweek: mk(), Sunday: mk(), Other: mk() });
    const g = map.get(r.campus);
    const b = window.bucketOf(r);
    const bk = g[b];
    bk.rows.push(r);
    bk.total += r.total || 0;
    bk.main += r.main || 0;
    bk.fk += r.fk || 0;
    bk.ms += r.ms || 0;
    g.total += r.total || 0;
  });
  const arr = [...map.values()];
  if (campusOrder && Array.isArray(campusOrder)) {
    arr.sort((a, b) => {
      const ai = campusOrder.indexOf(a.campus); const bi = campusOrder.indexOf(b.campus);
      return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
    });
  } else {
    arr.sort((a, b) => b.total - a.total);
  }
  // Sort rows inside each bucket by date asc
  arr.forEach((g) => {
    ['Midweek', 'Sunday', 'Other'].forEach((k) => {
      g[k].rows.sort((a, b) => a.date < b.date ? -1 : 1);
    });
  });
  return arr;
};

// Override mergeAttendance to apply event labels with per-entry override support.
// Priority for excludeFromWeekly:
//   1. Entry's own boolean field (set via Add Entry toggle)
//   2. Assignment's explicit override (set via service detail picker)
//   3. Event's countsTowardWeekly default
//   4. false (included by default)
window.mergeAttendance = function() {
  var all = window.BASE_ATTENDANCE.concat(window.PUBLISHED_ENTRIES || []).concat(window.loadStoredEntries());
  var seen = new Map();
  all.forEach(function(r) { seen.set(r.date + '|' + r.campus + '|' + r.cat, r); });
  var merged = Array.from(seen.values());
  merged.sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
  var assignments = window.loadEventAssignments();
  var registry = window.loadEventRegistry();
  var evMap = {};
  registry.forEach(function(ev) { evMap[ev.id] = ev; });

  window.ATTENDANCE = merged.map(function(r) {
    var key = window.eventKey(r);
    var asgn = assignments[key];
    var assignedEventId = typeof asgn === 'string' ? asgn : (asgn && asgn.eventId) || null;
    var assignmentExclude = (asgn && typeof asgn === 'object' && typeof asgn.excludeFromWeekly === 'boolean') ? asgn.excludeFromWeekly : null;

    var eventId = r.eventId || assignedEventId || null;
    var ev = eventId ? evMap[eventId] : null;
    var eventName = ev ? ev.name : (eventId || null);

    var excludeFromWeekly;
    if (typeof r.excludeFromWeekly === 'boolean') {
      excludeFromWeekly = r.excludeFromWeekly;
    } else if (assignmentExclude !== null) {
      excludeFromWeekly = assignmentExclude;
    } else if (ev) {
      excludeFromWeekly = !ev.countsTowardWeekly;
    } else {
      excludeFromWeekly = false;
    }

    // Manual CFC-Wednesday entries store Mainstream High in `ms` and Mainstream
    // Middle in `msM`. Normalize to the same shape the base data uses (see
    // mergeCFCWedMM): `ms` = combined Mainstream, with msHigh/msMiddle as the
    // split. This lets every downstream consumer keep summing `ms`.
    var norm = (r.msM != null)
      ? { ms: (r.ms || 0) + (r.msM || 0),
          msHigh: (r.msHigh != null ? r.msHigh : (r.ms || 0)),
          msMiddle: (r.msMiddle != null ? r.msMiddle : (r.msM || 0)) }
      : {};

    return Object.assign({}, r, { eventId: eventId, eventName: eventName, excludeFromWeekly: excludeFromWeekly }, norm);
  });
};

window.publishEntries = async function() {
  var TOKEN = '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';
  var REPO = 'Israelt4/faith-attendance';
  var FILE = 'manual-entries.json';
  var API = 'https://api.github.com/repos/' + REPO + '/contents/' + FILE;

  var newEntries = window.loadStoredEntries();
  if (!newEntries.length) return { ok: false, msg: 'No new entries.' };

  var existing = window.PUBLISHED_ENTRIES || [];
  var map = {};
  existing.forEach(function(e) { map[e.date + '|' + e.campus + '|' + e.cat] = e; });
  newEntries.forEach(function(e) { map[e.date + '|' + e.campus + '|' + e.cat] = e; });
  var merged = Object.values(map).sort(function(a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

  var sha = null;
  try {
    var gr = await fetch(API, { headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' } });
    if (gr.ok) sha = (await gr.json()).sha;
  } catch(e) {}

  var body = {
    message: 'Publish attendance ' + new Date().toISOString().slice(0, 10),
    content: btoa(unescape(encodeURIComponent(JSON.stringify(merged, null, 2)))),
  };
  if (sha) body.sha = sha;

  var pr = await fetch(API, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
    body: JSON.stringify(body)
  });

  if (!pr.ok) {
    var err = await pr.json().catch(function() { return {}; });
    return { ok: false, msg: err.message || ('GitHub error ' + pr.status) };
  }

  window.PUBLISHED_ENTRIES = merged;
  localStorage.removeItem('fc_attendance_entries');
  window.mergeAttendance();
  window.dispatchEvent(new CustomEvent('fc-published'));
  return { ok: true, count: newEntries.length };
};

function PublishButton({ T, mobile }) {
  const [status, setStatus] = React.useState('idle');
  const storedCount = window.loadStoredEntries().length;
  if (storedCount === 0 && status === 'idle') return null;

  const handleClick = async () => {
    if (status !== 'idle') return;
    setStatus('publishing');
    try {
      const result = await window.publishEntries();
      if (result.ok) {
        setStatus('success');
        setTimeout(() => setStatus('idle'), 3000);
      } else {
        setStatus('error');
        setTimeout(() => setStatus('idle'), 4000);
      }
    } catch(e) {
      setStatus('error');
      setTimeout(() => setStatus('idle'), 4000);
    }
  };

  const label = status === 'publishing' ? (mobile ? '…' : 'Publishing…')
    : status === 'success' ? (mobile ? '✓' : '✓ Published')
    : status === 'error' ? (mobile ? '✕' : 'Failed — retry')
    : mobile ? `↑${storedCount}` : `↑ Publish (${storedCount})`;

  const bg = status === 'success' ? '#4a7c59' : status === 'error' ? '#b94040' : T.wine;

  return (
    <button onClick={handleClick} disabled={status !== 'idle'}
      title={status === 'idle' ? `Publish ${storedCount} new entr${storedCount !== 1 ? 'ies' : 'y'} — everyone will see them` : ''}
      style={{
        padding: mobile ? '0' : '7px 13px',
        width: mobile ? 38 : 'auto', height: mobile ? 38 : 'auto',
        border: 'none', background: bg, borderRadius: mobile ? 999 : 4,
        fontFamily: T.sans, fontSize: mobile ? 13 : 11.5, fontWeight: 600,
        color: '#fbf6ec', cursor: status === 'idle' ? 'pointer' : 'default',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5,
        opacity: status === 'publishing' ? 0.7 : 1, transition: 'background .2s', flexShrink: 0,
      }}>
      {!mobile && status === 'idle' && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>}
      {label}
    </button>
  );
}
window.PublishButton = PublishButton;

window.exportCSV = function() {
  var rows = window.ATTENDANCE;
  var cols = ['date','campus','cat','main','fk','ms','total','notes','weekOf','year','month','quarter','eventId','eventName','excludeFromWeekly'];
  var lines = [cols.join(',')];
  rows.forEach(function(r) {
    lines.push(cols.map(function(c) {
      var v = r[c];
      return v == null ? '' : (String(v).indexOf(',') !== -1 ? '"' + v + '"' : v);
    }).join(','));
  });
  var blob = new Blob([lines.join('\n')], {type:'text/csv'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);

};

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
// charts.jsx — lightweight SVG chart primitives for the dashboards
// Exposes: LineChart, AreaTrend, StackedBar, GroupedBar, Sparkline, Heatmap, DonutKpi
// All accept { width, height, data, ...opts }

const fmt = (n) => {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000) return (n/1000).toFixed(n>=10000?0:1) + 'k';
  return Math.round(n).toLocaleString();
};
const fmtFull = (n) => n == null ? '—' : Math.round(n).toLocaleString();

// ---------- LineChart ----------
function LineChart({ width=600, height=220, series=[], xLabels=[], colors=['#7a2e2e'], stroke=2, fill=false, padding={t:16,r:16,b:28,l:36}, gridColor='rgba(0,0,0,.07)', textColor='rgba(40,30,20,.55)', font='inherit', yTickCount=4, showDots=false, onHover }) {
  const [hover, setHover] = React.useState(null);
  const P = padding;
  const W = width - P.l - P.r;
  const H = height - P.t - P.b;
  const allVals = series.flatMap(s => s.values).filter(v => v != null && !isNaN(v));
  const maxV = allVals.length ? Math.max(...allVals) : 1;
  const niceMax = Math.ceil(maxV * 1.08 / 100) * 100 || 1;
  const n = xLabels.length || (series[0]?.values.length ?? 0);
  const x = (i) => P.l + (n<=1 ? W/2 : (i / (n-1)) * W);
  const y = (v) => P.t + H - (v / niceMax) * H;
  const ticks = Array.from({length: yTickCount+1}, (_,i) => Math.round(niceMax * i / yTickCount));

  const buildPath = (values) => {
    let d = '';
    let started = false;
    values.forEach((v, i) => {
      if (v == null || isNaN(v)) { started = false; return; }
      d += (started ? ' L' : 'M') + x(i) + ',' + y(v);
      started = true;
    });
    return d;
  };
  const buildArea = (values) => {
    let segs = [];
    let cur = [];
    values.forEach((v, i) => {
      if (v == null || isNaN(v)) {
        if (cur.length) segs.push(cur);
        cur = [];
      } else {
        cur.push([i, v]);
      }
    });
    if (cur.length) segs.push(cur);
    return segs.map(seg => {
      let d = 'M' + x(seg[0][0]) + ',' + (P.t+H);
      seg.forEach(([i,v]) => { d += ' L' + x(i) + ',' + y(v); });
      d += ' L' + x(seg[seg.length-1][0]) + ',' + (P.t+H) + ' Z';
      return d;
    }).join(' ');
  };

  return (
    <svg width={width} height={height} style={{font, display:'block', overflow:'visible'}} onMouseLeave={()=>{setHover(null); onHover && onHover(null);}}>
      {ticks.map((t,i) => (
        <g key={i}>
          <line x1={P.l} x2={width-P.r} y1={y(t)} y2={y(t)} stroke={gridColor} strokeWidth="1"/>
          <text x={P.l-8} y={y(t)+3} fontSize="10" fill={textColor} textAnchor="end">{fmt(t)}</text>
        </g>
      ))}
      {xLabels.map((lab, i) => {
        const step = Math.ceil(n / 8);
        if (i % step !== 0 && i !== n-1) return null;
        return <text key={i} x={x(i)} y={height-P.b+14} fontSize="10" fill={textColor} textAnchor="middle">{lab}</text>;
      })}
      {series.map((s, si) => {
        const c = s.color || colors[si % colors.length];
        return (
          <g key={si}>
            {fill && <path d={buildArea(s.values)} fill={c} fillOpacity={s.fillOpacity ?? 0.12}/>}
            <path d={buildPath(s.values)} fill="none" stroke={c} strokeWidth={s.stroke ?? stroke} strokeLinecap="round" strokeLinejoin="round" strokeDasharray={s.dash}/>
            {showDots && s.values.map((v,i) => v == null ? null : (
              <circle key={i} cx={x(i)} cy={y(v)} r="2.5" fill={c}/>
            ))}
          </g>
        );
      })}
      {/* hover bands */}
      {xLabels.map((lab, i) => (
        <rect key={i} x={x(i) - W/n/2} y={P.t} width={W/n} height={H} fill="transparent"
          onMouseEnter={() => { setHover(i); onHover && onHover({i, lab}); }}/>
      ))}
      {hover != null && (
        <g pointerEvents="none">
          <line x1={x(hover)} x2={x(hover)} y1={P.t} y2={P.t+H} stroke="rgba(0,0,0,.25)" strokeDasharray="3 3"/>
          {series.map((s, si) => {
            const v = s.values[hover];
            if (v == null) return null;
            return <circle key={si} cx={x(hover)} cy={y(v)} r="4" fill="#fff" stroke={s.color || colors[si%colors.length]} strokeWidth="2"/>;
          })}
          <g transform={`translate(${Math.min(x(hover)+10, width-P.r-120)}, ${P.t+8})`}>
            <rect x="0" y="0" width="120" height={20 + series.length*16} fill="#fff" stroke="rgba(0,0,0,.15)" rx="4"/>
            <text x="8" y="14" fontSize="10" fill="rgba(40,30,20,.6)">{xLabels[hover]}</text>
            {series.map((s, si) => (
              <g key={si}>
                <circle cx="12" cy={28+si*16} r="3.5" fill={s.color || colors[si%colors.length]}/>
                <text x="22" y={31+si*16} fontSize="11" fill="rgba(40,30,20,.85)">{s.name}</text>
                <text x="112" y={31+si*16} fontSize="11" fontWeight="600" fill="rgba(40,30,20,.85)" textAnchor="end">{fmtFull(s.values[hover])}</text>
              </g>
            ))}
          </g>
        </g>
      )}
    </svg>
  );
}

// ---------- StackedBar (vertical) ----------
function StackedBar({ width=600, height=220, data=[], keys=[], colors=[], xLabels=[], padding={t:12,r:8,b:24,l:32}, gridColor='rgba(0,0,0,.07)', textColor='rgba(40,30,20,.55)', barGap=0.3 }) {
  const P = padding;
  const W = width - P.l - P.r;
  const H = height - P.t - P.b;
  const totals = data.map(d => keys.reduce((a,k)=> a + (d[k]||0), 0));
  const maxV = Math.max(...totals, 1);
  const niceMax = Math.ceil(maxV * 1.05 / 100) * 100;
  const n = data.length;
  const bw = (W / n) * (1 - barGap);
  const step = W / n;
  const y = (v) => P.t + H - (v / niceMax) * H;
  const ticks = [0, niceMax/2, niceMax];
  return (
    <svg width={width} height={height} style={{display:'block', overflow:'visible'}}>
      {ticks.map((t,i) => (
        <g key={i}>
          <line x1={P.l} x2={width-P.r} y1={y(t)} y2={y(t)} stroke={gridColor}/>
          <text x={P.l-6} y={y(t)+3} fontSize="10" fill={textColor} textAnchor="end">{fmt(t)}</text>
        </g>
      ))}
      {data.map((d, di) => {
        let acc = 0;
        const cx = P.l + step*di + step/2;
        return (
          <g key={di}>
            {keys.map((k, ki) => {
              const v = d[k] || 0;
              const yTop = y(acc + v);
              const yBot = y(acc);
              acc += v;
              return <rect key={ki} x={cx - bw/2} y={yTop} width={bw} height={Math.max(0, yBot-yTop)} fill={colors[ki]}/>;
            })}
            <text x={cx} y={height-P.b+13} fontSize="10" fill={textColor} textAnchor="middle">{xLabels[di] || ''}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ---------- HorizBar ----------
function HorizBar({ width=300, height=200, data=[], color='#7a2e2e', textColor='rgba(40,30,20,.85)', subColor='rgba(40,30,20,.5)', fontFamily='inherit', barTrack='rgba(0,0,0,.06)', maxV }) {
  const max = maxV ?? Math.max(...data.map(d=>d.value), 1);
  const rowH = height / data.length;
  const labelW = 64;
  const valW = 56;
  const trackW = width - labelW - valW - 16;
  return (
    <svg width={width} height={height} style={{display:'block', fontFamily}}>
      {data.map((d, i) => {
        const w = (d.value / max) * trackW;
        const cy = rowH * i + rowH/2;
        return (
          <g key={i}>
            <text x={0} y={cy+4} fontSize="12" fill={textColor} fontWeight="500">{d.label}</text>
            <rect x={labelW} y={cy-7} width={trackW} height="14" fill={barTrack} rx="2"/>
            <rect x={labelW} y={cy-7} width={w} height="14" fill={d.color || color} rx="2"/>
            <text x={labelW+trackW+8} y={cy+4} fontSize="11" fill={subColor} style={{fontVariantNumeric:'tabular-nums'}}>{fmtFull(d.value)}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ---------- Sparkline ----------
function Sparkline({ width=80, height=22, values=[], color='#7a2e2e', strokeWidth=1.5, fill=true }) {
  const vals = values.filter(v => v != null);
  if (!vals.length) return <svg width={width} height={height}/>;
  const max = Math.max(...vals);
  const min = Math.min(...vals);
  const range = max - min || 1;
  const x = (i) => (i / (values.length-1 || 1)) * width;
  const y = (v) => height - ((v - min) / range) * (height - 4) - 2;
  let d = '';
  let started = false;
  values.forEach((v,i) => {
    if (v == null) { started = false; return; }
    d += (started?' L':'M') + x(i) + ',' + y(v);
    started = true;
  });
  const areaD = d + ` L${width},${height} L0,${height} Z`;
  return (
    <svg width={width} height={height} style={{display:'block'}}>
      {fill && <path d={areaD} fill={color} fillOpacity="0.14"/>}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

// ---------- Heatmap (campus x month) ----------
function Heatmap({ width=600, height=240, rows=[], cols=[], values=[], color='#7a2e2e', maxV, cellGap=2, padding={t:8,r:8,b:24,l:60}, textColor='rgba(40,30,20,.6)' }) {
  const P = padding;
  const W = width - P.l - P.r;
  const H = height - P.t - P.b;
  const cw = W / cols.length - cellGap;
  const ch = H / rows.length - cellGap;
  const max = maxV ?? Math.max(...values.flat().filter(v=>v!=null), 1);
  const cellColor = (v) => {
    if (v == null) return 'rgba(0,0,0,0.04)';
    const t = Math.max(0.05, Math.min(1, v / max));
    return color + Math.round(t*255).toString(16).padStart(2,'0');
  };
  return (
    <svg width={width} height={height} style={{display:'block', overflow:'visible'}}>
      {rows.map((r, ri) => (
        <text key={ri} x={P.l-8} y={P.t + ch*(ri+0.5) + 4 + cellGap*ri} fontSize="11" fill={textColor} textAnchor="end" fontWeight="500">{r}</text>
      ))}
      {cols.map((c, ci) => {
        if (ci % 2 !== 0 && cols.length > 12) return null;
        return <text key={ci} x={P.l + cw*(ci+0.5) + cellGap*ci} y={height-P.b+12} fontSize="10" fill={textColor} textAnchor="middle">{c}</text>;
      })}
      {rows.map((r, ri) => values[ri].map((v, ci) => (
        <g key={`${ri}-${ci}`}>
          <rect x={P.l + ci*(cw+cellGap)} y={P.t + ri*(ch+cellGap)} width={cw} height={ch} fill={cellColor(v)} rx="2"/>
        </g>
      )))}
    </svg>
  );
}

window.LineChart = LineChart;
window.StackedBar = StackedBar;
window.HorizBar = HorizBar;
window.Sparkline = Sparkline;
window.Heatmap = Heatmap;
window.fmt = fmt;
window.fmtFull = fmtFull;

</script>

<script type="text/babel">
// aggregate.jsx — derive views from window.ATTENDANCE
// Exposes window.agg with pre-computed slices.

(function(){
  const ROWS = window.ATTENDANCE;
  const CAMPUSES = window.CAMPUSES;
  const SERVICE_CATS = window.SERVICE_CATS;

  // Filter helper
  function applyFilter(rows, filter) {
    if (!filter) return rows;
    return rows.filter(r => {
      if (filter.campuses && filter.campuses.length && !filter.campuses.includes(r.campus)) return false;
      if (filter.cats && filter.cats.length && !filter.cats.includes(r.cat)) return false;
      if (filter.years && filter.years.length && !filter.years.includes(r.year)) return false;
      if (filter.from && r.date < filter.from) return false;
      if (filter.to && r.date > filter.to) return false;
      return true;
    });
  }

  // Group by week (Wed→Sun). The CSV's "Week Of" column is the Wednesday of
  // each week, so weekOf is already the right bucket. A week is *complete*
  // once today is at least the Sunday of that bucket (5 days after Wed).
  function isCompleteWeek(weekOf, today=new Date()) {
    const wed = new Date(weekOf + 'T00:00:00');
    const sun = new Date(wed); sun.setDate(sun.getDate() + 4);
    return today >= sun;
  }

  function byWeek(rows) {
    const map = new Map();
    rows.forEach(r => {
      if (!map.has(r.weekOf)) map.set(r.weekOf, { weekOf: r.weekOf, total:0, fk:0, main:0, ms:0, n:0 });
      const e = map.get(r.weekOf);
      e.total += r.total || 0;
      e.fk += r.fk || 0;
      e.main += r.main || 0;
      e.ms += r.ms || 0;
      e.n += 1;
    });
    return [...map.values()].sort((a,b) => a.weekOf < b.weekOf ? -1 : 1);
  }

  function byMonth(rows) {
    const map = new Map();
    rows.forEach(r => {
      const key = r.year + '-' + String(r.month).padStart(2,'0');
      if (!map.has(key)) map.set(key, { key, year:r.year, month:r.month, total:0, fk:0, main:0, ms:0, n:0 });
      const e = map.get(key);
      e.total += r.total || 0;
      e.fk += r.fk || 0;
      e.main += r.main || 0;
      e.ms += r.ms || 0;
      e.n += 1;
    });
    return [...map.values()].sort((a,b) => a.key < b.key ? -1 : 1);
  }

  function byCampus(rows) {
    const map = new Map();
    CAMPUSES.forEach(c => map.set(c, { campus:c, total:0, fk:0, main:0, ms:0, n:0 }));
    rows.forEach(r => {
      const e = map.get(r.campus);
      if (!e) return;
      e.total += r.total || 0;
      e.fk += r.fk || 0;
      e.main += r.main || 0;
      e.ms += r.ms || 0;
      e.n += 1;
    });
    return [...map.values()];
  }

  function byCat(rows) {
    const map = new Map();
    SERVICE_CATS.forEach(c => map.set(c, { cat:c, total:0, n:0 }));
    rows.forEach(r => {
      const e = map.get(r.cat);
      if (!e) return;
      e.total += r.total || 0;
      e.n += 1;
    });
    return [...map.values()];
  }

  // Heatmap: campus rows × month cols (avg per service)
  function heatmap(rows) {
    const months = [];
    const seen = new Set();
    rows.forEach(r => {
      const k = r.year + '-' + String(r.month).padStart(2,'0');
      if (!seen.has(k)) { seen.add(k); months.push({key:k, year:r.year, month:r.month}); }
    });
    months.sort((a,b) => a.key < b.key ? -1 : 1);
    const data = CAMPUSES.map(c => months.map(m => {
      const matched = rows.filter(r => r.campus===c && r.year===m.year && r.month===m.month);
      if (!matched.length) return null;
      return matched.reduce((s,r) => s + (r.total||0), 0);
    }));
    return { campuses: CAMPUSES, months: months.map(m => m.month + '/' + String(m.year).slice(2)), data };
  }

  // KPI: latest completed week vs prior completed week (Wed→Sun definition).
  // avgWeek divides by COMPLETED week count, not service count.
  function kpis(rows, today=new Date()) {
    const weeklyRows = rows.filter(r => !r.excludeFromWeekly);
    const allWeeks = byWeek(weeklyRows);
    const completedWeeks = allWeeks.filter(w => isCompleteWeek(w.weekOf, today));
    const latest = completedWeeks[completedWeeks.length-1];
    const prev = completedWeeks[completedWeeks.length-2];
    const ytd = rows.filter(r => r.year === Math.max(...rows.map(x=>x.year))).reduce((s,r)=> s+(r.total||0), 0);
    const totalAll = rows.reduce((s,r)=> s+(r.total||0), 0);
    const completedTotal = completedWeeks.reduce((s,w)=> s+w.total, 0);
    const avgWeek = completedWeeks.length ? Math.round(completedTotal / completedWeeks.length) : 0;
    const totalFK = rows.reduce((s,r)=> s+(r.fk||0), 0);
    const totalMS = rows.reduce((s,r)=> s+(r.ms||0), 0);
    const totalMain = rows.reduce((s,r)=> s+(r.main||0), 0);
    return {
      latestWeek: latest,
      prevWeek: prev,
      ytdTotal: ytd,
      allTimeTotal: totalAll,
      avgWeek,
      mainServiceTotal: totalMain,
      faithKidsTotal: totalFK,
      mainstreamTotal: totalMS,
      weekCount: completedWeeks.length,
      serviceCount: rows.length,
      completedWeeks,
      allWeeks,
    };
  }

  // Match a current week to the same week last year by ISO-week index.
  function isoWeek(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const onejan = new Date(d.getFullYear(),0,1);
    return Math.ceil((((d - onejan)/86400000) + onejan.getDay()+1)/7);
  }

  function sameWeekLastYear(rows, weekOf) {
    const allWeeks = [...new Set(window.ATTENDANCE.map(r => r.weekOf))].sort();
    const byYear = {};
    allWeeks.forEach(w => {
      const yr = parseInt(w.slice(0, 4));
      if (!byYear[yr]) byYear[yr] = [];
      byYear[yr].push(w);
    });
    const yr = parseInt(weekOf.slice(0, 4));
    const idx = (byYear[yr] || []).indexOf(weekOf);
    if (idx === -1) return null;
    const priorWeekOf = (byYear[yr - 1] || [])[idx];
    if (!priorWeekOf) return null;
    const matched = rows.filter(r => r.weekOf === priorWeekOf);
    return matched.length ? matched.reduce((s, r) => s + (r.total || 0), 0) : null;
  }

  window.agg = { applyFilter, byWeek, byMonth, byCampus, byCat, heatmap, kpis, isCompleteWeek, isoWeek, sameWeekLastYear };
})();

</script>

<script type="text/babel">
// main-view.jsx — Faith Church · Leadership Weekly Check-In
// Single focused view: "How did we do this week — vs last week, vs same week last year?"
// Tabs: Overview / Trends / Campuses / Records

const M_THEME = {
  paper: '#f7f1e6',
  card: '#fbf6ec',
  cardAlt: '#f3ede0',
  rule: 'rgba(60,40,25,0.18)',
  ruleLight: 'rgba(60,40,25,0.10)',
  ink: '#231811',
  ink2: 'rgba(35,24,17,0.72)',
  ink3: 'rgba(35,24,17,0.52)',
  wine: '#7d3a35',
  clay: '#b87a4f',
  sage: '#6e8a6c',
  gold: '#a68534',
  rose: '#9c5a6a',
  good: '#5d7a4f',
  bad: '#a23a2e',
  display: '"Spectral", "Times New Roman", serif',
  sans: '"Hanken Grotesk", -apple-system, system-ui, sans-serif',
  mono: '"JetBrains Mono", "SF Mono", monospace'
};

function MainView({ density = 'comfortable', onDataChange, onEditRecord }) {
  const T = M_THEME;
  const ALL = window.ATTENDANCE;
  const TODAY = new Date();
  const [tab, setTab] = React.useState('overview'); // overview | trends | campuses | records
  const [drawer, setDrawer] = React.useState(null);
  const dens = density === 'compact';

  const k = window.agg.kpis(ALL, TODAY);
  const completed = k.completedWeeks;
  const [weekIdx, setWeekIdx] = React.useState(completed.length - 1);
  const safeIdx = Math.max(0, Math.min(weekIdx, completed.length - 1));
  const latest = completed[safeIdx] || null;
  const prev = safeIdx > 0 ? completed[safeIdx - 1] : null;

  // Same week last year
  const lastYearTotal = latest ? window.agg.sameWeekLastYear(ALL, latest.weekOf) : null;

  const wow = latest && prev ? (latest.total - prev.total) / prev.total * 100 : null;
  const yoy = latest && lastYearTotal ? (latest.total - lastYearTotal) / lastYearTotal * 100 : null;

  // Per-campus snapshot for latest week
  const latestRows = latest ? ALL.filter((r) => r.weekOf === latest.weekOf) : [];
  const prevRows = prev ? ALL.filter((r) => r.weekOf === prev.weekOf) : [];
  const campusCards = window.CAMPUSES.map((c) => {
    const cur = latestRows.filter((r) => r.campus === c).reduce((s, r) => s + (r.total || 0), 0);
    const prv = prevRows.filter((r) => r.campus === c).reduce((s, r) => s + (r.total || 0), 0);
    const delta = prv ? (cur - prv) / prv * 100 : null;
    return { campus: c, cur, prv, delta };
  }).filter((c) => c.cur > 0 || c.prv > 0);

  return (
    <div style={{
      width: '100%', height: '100%', background: T.paper, color: T.ink,
      fontFamily: T.sans, overflow: 'hidden', display: 'flex', flexDirection: 'column'
    }}>
      {/* Masthead */}
      <Masthead T={T} dens={dens} latest={latest} />

      {/* Tabs */}
      <Tabs T={T} tab={tab} onChange={setTab} />

      {/* Tab content */}
      <div style={{ flex: 1, overflow: 'auto' }}>
        {tab === 'overview' &&
        <OverviewTab T={T} dens={dens} latest={latest} prev={prev} lastYearTotal={lastYearTotal}
        wow={wow} yoy={yoy} k={k} latestRows={latestRows} campusCards={campusCards}
        onOpenRecord={setDrawer} weekIdx={safeIdx} setWeekIdx={setWeekIdx} completedCount={completed.length} />
        }
        {tab === 'trends' && <TrendsTab T={T} dens={dens} k={k} />}
        {tab === 'campuses' && <CampusesTab T={T} dens={dens} />}
        {tab === 'events' && <window.EventsTab T={T} dens={dens} onDataChange={onDataChange} />}
        {tab === 'records' && <RecordsTab T={T} dens={dens} onOpenRecord={setDrawer} onEditRecord={onEditRecord} />}
      </div>

      {drawer && <Drawer record={drawer} onClose={() => setDrawer(null)} theme={T} onDataChange={onDataChange} />}
    </div>);

}

function FontSizePicker({ T }) {
  const SIZES = [
    { key: 'normal', label: 'A', fs: 11 },
    { key: 'large',  label: 'A', fs: 14 },
    { key: 'xlarge', label: 'A', fs: 17 },
  ];
  const [size, setSize] = React.useState(() => {
    try { return localStorage.getItem('fc_font_size') || 'normal'; } catch(e) { return 'normal'; }
  });
  const apply = (s) => {
    setSize(s);
    try { localStorage.setItem('fc_font_size', s); } catch(e) {}
    const scales = { normal: 1, large: 1.15, xlarge: 1.3 };
    document.documentElement.style.zoom = scales[s] || 1;
  };
  return (
    <div title="Text size" style={{ display: 'flex', alignItems: 'center', border: `1px solid ${T.rule}`, borderRadius: 4, overflow: 'hidden', height: 30, flexShrink: 0 }}>
      {SIZES.map(({ key, label, fs }, i) => (
        <button key={key} onClick={() => apply(key)}
          style={{
            width: 26, height: '100%', border: 'none',

// ============= OVERVIEW (the 5-second answer) =============

function OverviewTab({ T, dens, latest, prev, lastYearTotal, wow, yoy, k, latestRows, campusCards, onOpenRecord, weekIdx, setWeekIdx, completedCount }) {
  if (!latest) return <div style={{ padding: 40, color: T.ink3 }}>No completed weeks of data.</div>;

  const _ytdYr = parseInt(latest.weekOf.slice(0, 4));
  const _cWks = k.completedWeeks.filter(w => parseInt(w.weekOf.slice(0, 4)) === _ytdYr && w.weekOf <= latest.weekOf);
  const _ytdN = _cWks.length;
  const ytdAvg = _ytdN > 0 ? _cWks.reduce((s, w) => s + w.total, 0) / _ytdN : null;
  const _pWks = k.completedWeeks.filter(w => parseInt(w.weekOf.slice(0, 4)) === _ytdYr - 1).slice(0, _ytdN);
  const lyYtdAvg = _pWks.length > 0 ? _pWks.reduce((s, w) => s + w.total, 0) / _pWks.length : null;
  const ytdDelta = ytdAvg && lyYtdAvg ? (ytdAvg - lyYtdAvg) / lyYtdAvg * 100 : null;
  const sundayRows = latestRows.filter(r => window.bucketOf(r) === 'Sunday' && !r.excludeFromWeekly);
  const midweekRows = latestRows.filter(r => window.bucketOf(r) === 'Midweek' && !r.excludeFromWeekly);
  const sundayTotal = sundayRows.reduce((s,r) => s+(r.total||0), 0);
  const midweekTotal = midweekRows.reduce((s,r) => s+(r.total||0), 0);
  const [breakdown, setBreakdown] = React.useState(null); // 'Sunday' | 'Midweek' | null
  return (
    <div style={{ padding: `${dens ? 20 : 28}px ${dens ? 20 : 28}px` }}>
      {/* Week navigation */}
      {completedCount > 1 && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: dens ? 16 : 20 }}>
          <button
            onClick={() => setWeekIdx((i) => Math.max(0, i - 1))}
            disabled={weekIdx <= 0}
            style={{ width: 32, height: 32, borderRadius: 4, border: `1px solid ${T.rule}`, background: 'transparent', color: weekIdx <= 0 ? T.ink3 : T.ink, cursor: weekIdx <= 0 ? 'default' : 'pointer', fontFamily: T.sans, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, opacity: weekIdx <= 0 ? 0.35 : 1 }}>←</button>
          <div style={{ flex: 1, textAlign: 'center', fontFamily: T.sans, fontSize: 13, color: T.ink2 }}>
            {weekIdx === completedCount - 1
              ? <span style={{ fontFamily: T.mono, fontSize: 12, color: T.ink3, letterSpacing: '.06em' }}>Most recent · week of {latest.weekOf}</span>
              : <span><span style={{ fontFamily: T.display, fontSize: 14, fontWeight: 500, color: T.wine }}>{completedCount - 1 - weekIdx}</span><span style={{ fontFamily: T.mono, fontSize: 12, color: T.ink3, letterSpacing: '.06em' }}> week{completedCount - 1 - weekIdx !== 1 ? 's' : ''} ago · week of {latest.weekOf}</span></span>
            }
          </div>
          <button
            onClick={() => setWeekIdx((i) => Math.min(completedCount - 1, i + 1))}
            disabled={weekIdx >= completedCount - 1}
            style={{ width: 32, height: 32, borderRadius: 4, border: `1px solid ${T.rule}`, background: 'transparent', color: weekIdx >= completedCount - 1 ? T.ink3 : T.ink, cursor: weekIdx >= completedCount - 1 ? 'default' : 'pointer', fontFamily: T.sans, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, opacity: weekIdx >= completedCount - 1 ? 0.35 : 1 }}>→</button>
        </div>
      )}
      {/* HERO */}
      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 1fr', gap: dens ? 16 : 20, marginBottom: dens ? 20 : 28 }}>
        {/* This week */}
        <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 22 : 30 }}>
          <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>This week</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 14, marginBottom: 14 }}>
            <div style={{ fontFamily: T.display, fontSize: dens ? 56 : 72, fontWeight: 500, lineHeight: .9, letterSpacing: '-0.025em', fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(latest.total)}</div>
            <div style={{ fontFamily: T.display, fontSize: 15, fontStyle: 'italic', color: T.ink2 }}>across the network</div>
          </div>
          <div style={{ display: 'flex', gap: 18, fontFamily: T.sans, fontSize: 12.5, color: T.ink2, paddingTop: 10, borderTop: `1px solid ${T.ruleLight}` }}>
            <Bullet T={T} label="Main Service" value={latest.main} color={T.wine} />
            <Bullet T={T} label="FaithKids" value={latest.fk} color={T.clay} />
            <Bullet T={T} label="Mainstream" value={latest.ms} color={T.sage} />
          </div>
        </div>

        {/* vs last week */}
        <DeltaCard T={T} dens={dens} title="vs last week" delta={wow}
        curN={latest.total} prevN={prev?.total} prevLabel={prev ? `Week of ${prev.weekOf}` : '—'} />
        {/* YTD avg */}
        <DeltaCard T={T} dens={dens} title="YTD weekly avg" delta={ytdDelta}
        curN={ytdAvg ? Math.round(ytdAvg) : null} prevN={lyYtdAvg ? Math.round(lyYtdAvg) : null} prevLabel={lyYtdAvg ? `${_ytdYr - 1} avg · ${_ytdN} wks` : 'No prior year data'} />
      </div>

      {/* Sunday / Midweek split */}
      {(sundayTotal > 0 || midweekTotal > 0) && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: dens ? 16 : 20, marginBottom: dens ? 20 : 28 }}>
          <div onClick={() => setBreakdown('Sunday')} title="Click to see every Sunday entry for this week" style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 22, cursor: 'pointer' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
              <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Sunday · all campuses</div>
              <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.12em', textTransform: 'uppercase', color: T.wine }}>View entries ›</div>
            </div>
            <div style={{ fontFamily: T.display, fontSize: dens ? 40 : 52, fontWeight: 500, lineHeight: .9, letterSpacing: '-0.025em', fontVariantNumeric: 'tabular-nums', marginBottom: 12 }}>{window.fmtFull(sundayTotal)}</div>
            <div style={{ display: 'flex', gap: 18, fontFamily: T.sans, fontSize: 12.5, color: T.ink2, paddingTop: 10, borderTop: `1px solid ${T.ruleLight}` }}>
              <Bullet T={T} label="Main Service" value={sundayRows.reduce((s,r) => s+(r.main||0), 0)} color={T.wine} />
              <Bullet T={T} label="FaithKids" value={sundayRows.reduce((s,r) => s+(r.fk||0), 0)} color={T.clay} />
              {sundayRows.reduce((s,r) => s+(r.ms||0), 0) > 0 && <Bullet T={T} label="Mainstream" value={sundayRows.reduce((s,r) => s+(r.ms||0), 0)} color={T.sage} />}
            </div>
          </div>
          <div onClick={() => setBreakdown('Midweek')} title="Click to see every Midweek entry for this week" style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 22, cursor: 'pointer' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 6 }}>
              <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Midweek · all campuses</div>
              <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.12em', textTransform: 'uppercase', color: T.wine }}>View entries ›</div>
            </div>
            <div style={{ fontFamily: T.display, fontSize: dens ? 40 : 52, fontWeight: 500, lineHeight: .9, letterSpacing: '-0.025em', fontVariantNumeric: 'tabular-nums', marginBottom: 12 }}>{window.fmtFull(midweekTotal)}</div>
            <div style={{ display: 'flex', gap: 18, fontFamily: T.sans, fontSize: 12.5, color: T.ink2, paddingTop: 10, borderTop: `1px solid ${T.ruleLight}` }}>
              <Bullet T={T} label="Main Service" value={midweekRows.reduce((s,r) => s+(r.main||0), 0)} color={T.wine} />
              <Bullet T={T} label="FaithKids" value={midweekRows.reduce((s,r) => s+(r.fk||0), 0)} color={T.clay} />
              <Bullet T={T} label="Mainstream" value={midweekRows.reduce((s,r) => s+(r.ms||0), 0)} color={T.sage} />
            </div>
          </div>
        </div>
      )}

      {breakdown && (
        <BreakdownModal T={T} dens={dens} bucket={breakdown}
          rows={breakdown === 'Sunday' ? sundayRows : midweekRows}
          weekOf={latest.weekOf} onClose={() => setBreakdown(null)} />
      )}

      {(() => {
        const seen = new Set(); const evCards = [];
        (latestRows || []).forEach(r => {
          if (r.eventId && !seen.has(r.eventId)) {
            seen.add(r.eventId);
            const evRows = (latestRows || []).filter(x => x.eventId === r.eventId);
            const total = evRows.reduce((s, x) => s + (x.total || 0), 0);
            const yr = parseInt(latest.weekOf.slice(0, 4));
            const lyRows = window.ATTENDANCE.filter(x => x.eventId === r.eventId && x.year === yr - 1);
            const lastYearTotal = lyRows.length ? lyRows.reduce((s, x) => s + (x.total || 0), 0) : null;
            evCards.push({ eventId: r.eventId, eventName: r.eventName, total, lastYearTotal });
          }
        });
        return evCards.length > 0 ? (
          <div style={{ marginBottom: dens ? 16 : 20, display: 'flex', flexDirection: 'column', gap: dens ? 10 : 14 }}>
            {evCards.map(ev => <window.EventHighlightCard key={ev.eventId} T={T} dens={dens} ev={ev} />)}
          </div>
        ) : null;
      })()}

      {/* Sub-row: per-campus snapshot + spark */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: dens ? 16 : 20, marginBottom: dens ? 20 : 28 }}>
        <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
            <div>
              <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>By campus · this week</div>
              <h3 style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, margin: '2px 0 0' }}>How each location did</h3>
            </div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: dens ? 6 : 8 }}>
            {campusCards.sort((a, b) => b.cur - a.cur).map((c) =>
            <CampusRow key={c.campus} T={T} c={c} dens={dens} />
            )}
          </div>
        </div>

        {/* 4-week trailing & average */}
        <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 14 }}>
            <div>
              <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Trailing weeks</div>
              <h3 style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, margin: '2px 0 0' }}>Last 8 completed weeks</h3>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontFamily: T.display, fontSize: 22, fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(trailingAvg(k.completedWeeks, 4))}</div>
              <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', color: T.ink3, textTransform: 'uppercase' }}>Trailing 4-wk avg</div>
            </div>
          </div>
          <window.LineChart
            width={dens ? 580 : 600} height={dens ? 140 : 170}
            series={[{
              name: 'Total', color: T.wine,
              values: k.completedWeeks.slice(-8).map((w) => w.total)
            }]}
            xLabels={k.completedWeeks.slice(-8).map((w) => w.weekOf.slice(5))}
            fill={true}
            colors={[T.wine]}
            padding={{ t: 10, r: 14, b: 24, l: 42 }}
            gridColor={T.ruleLight}
            textColor={T.ink3}
            showDots={true} />
          
          <div style={{ display: 'flex', gap: 14, marginTop: 10, paddingTop: 12, borderTop: `1px solid ${T.ruleLight}`, fontFamily: T.sans, fontSize: 12, color: T.ink2 }}>
            <SmallStat T={T} label="8-wk avg" value={trailingAvg(k.completedWeeks, 8)} />
            <SmallStat T={T} label={`${_ytdYr} avg / wk`} value={ytdAvg ? Math.round(ytdAvg) : 0} />
            <SmallStat T={T} label={`${_ytdYr} total`} value={_cWks.reduce((s, w) => s + w.total, 0)} />
          </div>
        </div>
      </div>

      {/* Services this week */}
      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
          <div>
            <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Service-by-service · this week</div>
            <h3 style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, margin: '2px 0 0' }}>{latestRows.length} services on record</h3>
          </div>
          <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 13, color: T.ink2 }}>Tap a rollup to expand · click any service for detail</div>
        </div>
        {/* Column header */}
        <div style={{ display: 'grid', gridTemplateColumns: '24px 1fr 90px 90px 90px 110px', gap: 8, padding: '0 8px 6px', borderBottom: `1.5px solid ${T.ink}`, fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.18em', textTransform: 'uppercase', color: T.ink3 }}>
          <span></span>
          <span>Service</span>
          <span style={{ textAlign: 'right' }}>Main</span>
          <span style={{ textAlign: 'right' }}>FaithKids</span>
          <span style={{ textAlign: 'right' }}>Mainstream</span>
          <span style={{ textAlign: 'right' }}>Total</span>
        </div>
        <ServiceTable T={T} dens={dens} rows={latestRows} onOpenRecord={onOpenRecord} />
      </div>
    </div>);

}

function Bullet({ T, label, value, color }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
      <span style={{ width: 7, height: 7, borderRadius: '50%', background: color, display: 'inline-block' }} />
      <span style={{ color: T.ink3, fontFamily: T.mono, fontSize: 10, letterSpacing: '.1em', textTransform: 'uppercase' }}>{label}</span>
      <span style={{ fontFamily: T.display, fontSize: 18, fontWeight: 500, color: T.ink, fontVariantNumeric: 'tabular-nums' }}>{value == null ? '—' : window.fmtFull(value)}</span>
    </div>);

}

function DeltaCard({ T, dens, title, delta, curN, prevN, prevLabel }) {
  const has = delta != null && !isNaN(delta);
  const good = has && delta >= 0;
  const tone = !has ? T.ink3 : good ? T.good : T.bad;
  const arrow = !has ? '·' : good ? '↑' : '↓';
  const diff = has ? curN - prevN : null;
  return (
    <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 22 : 30, position: 'relative', overflow: 'hidden' }}>
      <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: has ? tone : 'transparent' }} />
      <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>{title}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 10 }}>
        <div style={{ fontFamily: T.display, fontSize: dens ? 44 : 54, fontWeight: 500, color: tone, lineHeight: .9, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums' }}>
          {arrow} {has ? Math.abs(delta).toFixed(1) + '%' : '—'}
        </div>
      </div>
      <div style={{ fontFamily: T.display, fontSize: 15, fontStyle: 'italic', color: T.ink2, marginBottom: 6 }}>
        {has ? `${good ? '+' : '-'}${window.fmtFull(Math.abs(diff))} ${good ? 'more' : 'fewer'} attended` : 'Not enough data'}
      </div>
      <div style={{ fontFamily: T.mono, fontSize: 10.5, letterSpacing: '.06em', color: T.ink3 }}>{prevLabel}{prevN ? ` · ${window.fmtFull(prevN)}` : ''}</div>
    </div>);

}

function CampusRow({ T, c, dens }) {
  const has = c.delta != null && !isNaN(c.delta);
  const good = has && c.delta >= 0;
  const tone = !has ? T.ink3 : good ? T.good : T.bad;
  const fullName = window.CAMPUS_LABEL && window.CAMPUS_LABEL[c.campus] || c.campus;
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 100px 80px', gap: 8, alignItems: 'center', padding: `${dens ? 6 : 8}px 10px`, borderRadius: 4, background: T.cardAlt }}>
      <div>
        <div style={{ fontFamily: T.sans, fontSize: 13, fontWeight: 600 }}>{fullName}</div>
        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3, letterSpacing: '.06em', marginTop: 1 }}>{c.campus}</div>
      </div>
      <div style={{ textAlign: 'right' }}>
        <div style={{ fontFamily: T.display, fontSize: 18, fontWeight: 500, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(c.cur)}</div>
        <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3, letterSpacing: '.06em' }}>this wk</div>
      </div>
      <div style={{ textAlign: 'right' }}>
        {has ?
        <>
            <div style={{ fontFamily: T.display, fontSize: 14, color: tone, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{good ? '↑' : '↓'} {Math.abs(c.delta).toFixed(0)}%</div>
            <div style={{ fontFamily: T.mono, fontSize: 9, color: tone, fontVariantNumeric: 'tabular-nums', fontWeight: 600 }}>{c.prv ? (c.cur - c.prv >= 0 ? '+' : '') + Math.round(c.cur - c.prv).toLocaleString() : ''}</div>
            <div style={{ fontFamily: T.mono, fontSize: 9.5, color: T.ink3, letterSpacing: '.06em' }}>vs last wk</div>
          </> :

        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3 }}>—</div>
        }
      </div>
    </div>);

}

function SmallStat({ T, label, value }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase', color: T.ink3 }}>{label}</div>
      <div style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500, marginTop: 2, fontVariantNumeric: 'tabular-nums' }}>{window.fmtFull(value)}</div>
    </div>);

}

function trailingAvg(weeks, n) {
  const arr = weeks.slice(-n);
  if (!arr.length) return 0;
  return Math.round(arr.reduce((s, w) => s + w.total, 0) / arr.length);
}

function ServiceTable({ T, dens, rows, onOpenRecord }) {
  const groups = window.groupCampusBuckets(rows);
  const [expanded, setExpanded] = React.useState({});
  const toggle = (k) => setExpanded((s) => ({ ...s, [k]: !s[k] }));
  return (
    <div style={{ display: 'flex', flexDirection: 'column' }}>
      {groups.map((g, gi) => {

// ============= TRENDS =============

function TrendsTab({ T, dens }) {
  const ALL = window.ATTENDANCE;
  const TODAY = new Date();

  const allYears = [...new Set(ALL.map(r => r.year))].sort((a, b) => b - a);
  const curYear = allYears[0] || TODAY.getFullYear();

  const YEAR_COLORS = [T.wine, T.clay, T.sage, T.gold, T.rose, T.ink2];
  const yearColor = (yr) => YEAR_COLORS[allYears.indexOf(yr) % YEAR_COLORS.length];

  const [metric, setMetric] = React.useState('total');
  const [campus, setCampus] = React.useState('all');
  const [activeYears, setActiveYears] = React.useState(() => allYears.slice(0, 2));

  const toggleYear = (yr) =>
    setActiveYears(prev => prev.includes(yr)
      ? (prev.length > 1 ? prev.filter(y => y !== yr) : prev)
      : [...prev, yr]);

  const metricVal = (w) =>
    metric === 'main' ? (w.main || 0)
    : metric === 'fk'  ? (w.fk  || 0)
    : metric === 'ms'  ? (w.ms  || 0)
    : w.total;

  const weekMap = React.useMemo(() => {
    const rows = campus === 'all' ? ALL : ALL.filter(r => r.campus === campus);
    const weeks = window.agg.byWeek(rows.filter(r => !r.excludeFromWeekly));
    const map = {};
    weeks.forEach(w => {
      if (!window.agg.isCompleteWeek(w.weekOf, TODAY)) return;
      const yr = parseInt(w.weekOf.slice(0, 4));
      const wk = window.agg.isoWeek(w.weekOf);
      if (!map[yr]) map[yr] = {};
      map[yr][wk] = metricVal(w);
    });
    return map;
  }, [campus, metric]);

  const xPositions = Array.from({ length: 52 }, (_, i) => i + 1);
  const MONTH_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const xLabels = xPositions.map((wk, i) => {
    const mo = Math.min(Math.floor((wk - 1) * 12 / 52), 11);
    const prev = i > 0 ? Math.min(Math.floor((xPositions[i-1] - 1) * 12 / 52), 11) : -1;
    return mo !== prev ? MONTH_LABELS[mo] : '';
  });

  const series = [...activeYears].sort((a, b) => a - b).map(yr => ({
    name: String(yr),
    color: yearColor(yr),
    stroke: yr === curYear ? 2.5 : 1.8,
    values: xPositions.map(wk => (weekMap[yr] || {})[wk] ?? null),
  }));

  const curData   = weekMap[curYear]     || {};
  const priorData = weekMap[curYear - 1] || {};
  const curWeeks  = Object.keys(curData).map(Number).sort((a, b) => a - b);
  const latestWk  = curWeeks[curWeeks.length - 1];
  const thisVal        = latestWk ? (curData[latestWk] ?? null)   : null;
  const priorSameVal   = latestWk ? (priorData[latestWk] ?? null) : null;
  const ytdAvg = curWeeks.length
    ? Math.round(curWeeks.reduce((s, w) => s + curData[w], 0) / curWeeks.length) : null;
  const priorYtdWks = Object.keys(priorData).map(Number).sort((a,b)=>a-b).slice(0, curWeeks.length);
  const priorYtdAvg = priorYtdWks.length
    ? Math.round(priorYtdWks.reduce((s,w) => s + priorData[w], 0) / priorYtdWks.length) : null;

  const pct  = (cur, pri) => pri ? (cur - pri) / pri * 100 : null;
  const fmtN = (n) => n != null ? n.toLocaleString() : '—';
  const fmtP = (d) => d == null ? '—' : (d >= 0 ? '+' : '') + d.toFixed(1) + '%';

  const METRICS = [
    { id: 'total', label: 'Total' },
    { id: 'main',  label: 'Main Service' },
    { id: 'fk',    label: 'FaithKids' },
    { id: 'ms',    label: 'Mainstream' },
  ];

  const Pill = ({ active, onClick, children, color }) => (
    <button onClick={onClick} style={{
      padding: '5px 12px', borderRadius: 999,
      border: `1px solid ${active ? (color || T.wine) : T.rule}`,
      background: active ? (color || T.wine) : 'transparent',
      color: active ? '#fbf6ec' : T.ink2,
      fontFamily: T.sans, fontSize: 11.5, fontWeight: 500, cursor: 'pointer',
    }}>{children}</button>
  );

  const wowDelta  = pct(thisVal, priorSameVal);
  const ytdDelta  = pct(ytdAvg, priorYtdAvg);
  const metricLabel = METRICS.find(m => m.id === metric)?.label || 'Total';

  const StatCard = ({ label, value, sub, delta }) => {
    const tone = delta == null ? T.ink : delta >= 0 ? T.good : T.bad;
    return (
      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 14 : 18, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: delta == null ? 'transparent' : tone }} />
        <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>{label}</div>
        <div style={{ fontFamily: T.display, fontSize: dens ? 22 : 28, fontWeight: 500, color: tone, lineHeight: 1, letterSpacing: '-0.02em', fontVariantNumeric: 'tabular-nums', marginBottom: 6 }}>{value}</div>
        <div style={{ fontFamily: T.mono, fontSize: 10, color: T.ink3 }}>{sub}</div>
      </div>
    );
  };

  return (
    <div style={{ padding: dens ? 20 : 28 }}>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3 }}>Trends</div>
        <h2 style={{ fontFamily: T.display, fontSize: 26, fontWeight: 500, margin: '2px 0 0', letterSpacing: '-0.01em' }}>Year over year</h2>
      </div>

      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 20, marginBottom: 20, alignItems: 'flex-start' }}>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase', color: T.ink3, marginBottom: 7 }}>Measure</div>
          <div style={{ display: 'flex', gap: 5 }}>
            {METRICS.map(m => <Pill key={m.id} active={metric === m.id} onClick={() => setMetric(m.id)}>{m.label}</Pill>)}
          </div>
        </div>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase', color: T.ink3, marginBottom: 7 }}>Campus</div>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            <Pill active={campus === 'all'} onClick={() => setCampus('all')}>All</Pill>
            {window.CAMPUSES.map(c => <Pill key={c} active={campus === c} onClick={() => setCampus(c)}>{c}</Pill>)}
          </div>
        </div>
        <div>
          <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.16em', textTransform: 'uppercase', color: T.ink3, marginBottom: 7 }}>Years</div>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            {allYears.map(yr => (
              <Pill key={yr} active={activeYears.includes(yr)} onClick={() => toggleYear(yr)} color={yearColor(yr)}>{yr}</Pill>
            ))}
          </div>
        </div>
      </div>

      <div style={{ background: T.card, border: `1px solid ${T.rule}`, borderRadius: 6, padding: dens ? 16 : 20, marginBottom: dens ? 14 : 18 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
          <div>
            <div style={{ fontFamily: T.display, fontSize: 17, fontWeight: 500 }}>{metricLabel} · {campus === 'all' ? 'All campuses' : campus}</div>
            <div style={{ fontFamily: T.sans, fontSize: 11.5, color: T.ink3, marginTop: 2 }}>weekly by calendar week, all selected years overlaid</div>
          </div>
          <div style={{ display: 'flex', gap: 14, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
            {series.map(s => (
              <div key={s.name} style={{ display: 'flex', alignItems: 'center', gap: 6, fontFamily: T.sans, fontSize: 11.5, color: T.ink2 }}>
                <span style={{ display: 'inline-block', width: 20, height: 0, borderTop: `${s.stroke}px solid ${s.color}` }} />
                {s.name}
              </div>
            ))}
          </div>
        </div>
        <window.LineChart
          width={1340} height={dens ? 240 : 290}
          series={series} xLabels={xLabels} fill={false}
          padding={{ t: 14, r: 24, b: 30, l: 54 }}
          gridColor={T.ruleLight} textColor={T.ink3} showDots={false} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: dens ? 12 : 16 }}>
        <StatCard label="Latest week" value={fmtN(thisVal)}
          sub={latestWk ? `Wk ${latestWk} · ${curYear}` : '—'} delta={null} />
        <StatCard label={`vs same wk ${curYear - 1}`} value={fmtP(wowDelta)}
          sub={priorSameVal != null ? `Prior: ${fmtN(priorSameVal)}` : 'No prior data'} delta={wowDelta} />
        <StatCard label={`${curYear} YTD avg / wk`} value={fmtN(ytdAvg)}
          sub={`${curWeeks.length} completed wk${curWeeks.length !== 1 ? 's' : ''}`} delta={null} />
        <StatCard label={`vs ${curYear - 1} YTD avg`} value={fmtP(ytdDelta)}
          sub={priorYtdAvg != null ? `Prior: ${fmtN(priorYtdAvg)}` : 'No prior data'} delta={ytdDelta} />
      </div>
    </div>
  );
}
