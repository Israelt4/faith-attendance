<script type="text/babel">

function DataEntryModal({ onClose, onSaved, editEntry }) {
  const T = window.M_THEME;
  const today = new Date().toISOString().slice(0, 10);
  const isEditing = !!editEntry;

  const initForm = () => {
    if (editEntry) {
      return {
        date: editEntry.date || today,
        campus: editEntry.campus || window.CAMPUSES[0],
        cat: editEntry.cat || window.SERVICE_CATS[0],
        main: editEntry.main != null ? String(editEntry.main) : '',
        fk: editEntry.fk != null ? String(editEntry.fk) : '',
        ms: editEntry.msHigh != null ? String(editEntry.msHigh) : (editEntry.ms != null ? String(editEntry.ms) : ''),
        msM: editEntry.msMiddle != null ? String(editEntry.msMiddle) : (editEntry.msM != null ? String(editEntry.msM) : ''),
        eventId: editEntry.eventId || null,
        excludeFromWeekly: !!editEntry.excludeFromWeekly,
      };
    }
    return {
      date: today,
      campus: window.CAMPUSES[0],
      cat: window.SERVICE_CATS[0],
      main: '', fk: '', ms: '', msM: '',
      eventId: null, excludeFromWeekly: false,
    };
  };

  const [form, setForm] = React.useState(initForm);
  const [savedFlash, setSavedFlash] = React.useState(false);
  const [sessionEntries, setSessionEntries] = React.useState([]);
  const [editingIdx, setEditingIdx] = React.useState(null);

  const numVal = (v) => parseInt(v) || 0;
  const isCFCWed = form.campus === 'CFC' && form.cat === 'Wednesday Service';
  const total = numVal(form.main) + numVal(form.fk) + numVal(form.ms) + (isCFCWed ? numVal(form.msM) : 0);
  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));

  const getWeekOf = (dateStr) => {
    const d = new Date(dateStr + 'T00:00:00');
    const day = d.getDay();
    const daysBack = day >= 3 ? day - 3 : day + 4;
    const wed = new Date(d);
    wed.setDate(d.getDate() - daysBack);
    return wed.toISOString().slice(0, 10);
  };

  const buildEntry = () => {
    const d = new Date(form.date + 'T00:00:00');
    return {
      date: form.date,
      campus: form.campus,
      cat: form.cat,
      main: numVal(form.main) || null,
      fk: numVal(form.fk) || null,
      ms: numVal(form.ms) || null,
      msM: (isCFCWed && numVal(form.msM)) ? numVal(form.msM) : null,
      total,
      weekOf: getWeekOf(form.date),
      year: d.getFullYear(),
      month: d.getMonth() + 1,
      quarter: Math.ceil((d.getMonth() + 1) / 3),
      isManual: true,
      eventId: form.eventId || null,
      excludeFromWeekly: !!form.excludeFromWeekly,
    };
  };

  const resetForm = () => {
    setForm((f) => ({ ...f, main: '', fk: '', ms: '', msM: '', eventId: null, excludeFromWeekly: false }));
    setEditingIdx(null);
  };

  const handleSubmit = () => {
    if (!form.date || !total) return;
    const entry = buildEntry();

    if (isEditing) {
      const stored = window.loadStoredEntries();
      if (editEntry.isManual) {
        const idx = stored.findIndex(r => r.date === editEntry.date && r.campus === editEntry.campus && r.cat === editEntry.cat);
        if (idx !== -1) stored[idx] = entry; else stored.push(entry);
      } else {
        stored.push(entry);
      }
      localStorage.setItem('fc_attendance_entries', JSON.stringify(stored));
      onSaved();
      onClose();
      return;
    }

    if (editingIdx !== null) {
      const origEntry = sessionEntries[editingIdx];
      const updatedSession = [...sessionEntries];
      updatedSession[editingIdx] = entry;
      const stored = window.loadStoredEntries();
      const storeIdx = stored.findIndex(r => r.isManual && r.date === origEntry.date && r.campus === origEntry.campus && r.cat === origEntry.cat);
      if (storeIdx !== -1) stored[storeIdx] = entry; else stored.push(entry);
      localStorage.setItem('fc_attendance_entries', JSON.stringify(stored));
      setSessionEntries(updatedSession);
      onSaved();
      resetForm();
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 2000);
      return;
    }

    const all = [...window.loadStoredEntries(), entry];
    try {
      localStorage.setItem('fc_attendance_entries', JSON.stringify(all));
    } catch (e) {
      alert('Could not save — browser storage may be full.');
      return;
    }
    setSessionEntries((prev) => [...prev, entry]);
    onSaved();
    resetForm();
    setSavedFlash(true);
    setTimeout(() => setSavedFlash(false), 2000);
  };

  const handleDeleteSession = (idx) => {
    const entry = sessionEntries[idx];
    const all = window.loadStoredEntries();
    const storeIdx = all.findIndex(r => r.isManual && r.date === entry.date && r.campus === entry.campus && r.cat === entry.cat);
    if (storeIdx !== -1) { all.splice(storeIdx, 1); localStorage.setItem('fc_attendance_entries', JSON.stringify(all)); }
    setSessionEntries((prev) => prev.filter((_, i) => i !== idx));
    if (editingIdx === idx) resetForm();
    onSaved();
  };

  const handleEditSession = (idx) => {
    const e = sessionEntries[idx];
    setForm({
      date: e.date, campus: e.campus, cat: e.cat,
      main: e.main != null ? String(e.main) : '',
      fk: e.fk != null ? String(e.fk) : '',
      ms: e.ms != null ? String(e.ms) : '',
      msM: e.msM != null ? String(e.msM) : '',
      eventId: e.eventId || null,
      excludeFromWeekly: !!e.excludeFromWeekly,
    });
    setEditingIdx(idx);
  };

  const iSt = {
    width: '100%', height: 38, padding: '0 10px',
    border: `1px solid ${T.rule}`, borderRadius: 4,
    background: T.card, color: T.ink,
    fontFamily: T.sans, fontSize: 14, outline: 'none',
    WebkitAppearance: 'auto',
  };
  const canSave = total > 0 && !!form.date;
  const btnLabel = isEditing ? 'Update Entry' : (editingIdx !== null ? 'Update' : 'Save Entry');

  return (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(35,24,17,.45)',
      zIndex: 1000, display: 'flex', alignItems: 'flex-start',
      justifyContent: 'center', padding: '40px 16px 60px', overflowY: 'auto',
    }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: '100%', maxWidth: 560, background: T.paper,
          borderRadius: 10, border: `1px solid ${T.rule}`,
          boxShadow: '0 24px 60px rgba(0,0,0,.22)',
          overflow: 'hidden', fontFamily: T.sans,
        }}>

        <div style={{
          padding: '20px 24px 16px', borderBottom: `1px solid ${T.rule}`,
          display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
        }}>
          <div>
            <div style={{ fontFamily: T.mono, fontSize: 10, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 4 }}>Attendance Entry</div>
            <h2 style={{ fontFamily: T.display, fontSize: 24, fontWeight: 500, margin: 0, letterSpacing: '-0.01em' }}>
              {isEditing ? 'Edit Record' : (editingIdx !== null ? 'Edit Entry' : 'Add Service Record')}
            </h2>
          </div>
          <button onClick={onClose} style={{
            background: 'transparent', border: `1px solid ${T.rule}`,
            width: 32, height: 32, borderRadius: '50%', cursor: 'pointer',
            color: T.ink2, fontSize: 14, display: 'flex',
            alignItems: 'center', justifyContent: 'center',
          }}>✕</button>
        </div>

        <div style={{ padding: '20px 24px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1.1fr 1fr 1.3fr', gap: 12, marginBottom: 16 }}>
            <EField label="Date" T={T}>
              <input type="date" value={form.date} onChange={(e) => set('date', e.target.value)} style={iSt} />
            </EField>
            <EField label="Campus" T={T}>
              <select value={form.campus} onChange={(e) => set('campus', e.target.value)} style={iSt}>
                {window.CAMPUSES.map((c) => (
                  <option key={c} value={c}>{c} — {(window.CAMPUS_LABEL || {})[c] || c}</option>
                ))}
              </select>
            </EField>
            <EField label="Service" T={T}>
              <select value={form.cat} onChange={(e) => set('cat', e.target.value)} style={iSt}>
                {window.SERVICE_CATS.map((c) => (
                  <option key={c} value={c}>{c === 'Thursday Service' ? 'The Voice' : c}</option>
                ))}
              </select>
            </EField>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: isCFCWed ? '1fr 1fr 1fr 1fr 76px' : '1fr 1fr 1fr 76px', gap: 12, marginBottom: 16 }}>
            <EField label="Main Service" T={T}>
              <input type="number" min="0" value={form.main} onChange={(e) => set('main', e.target.value)} placeholder="—" style={iSt} />
            </EField>
            <EField label="FaithKids" T={T}>
              <input type="number" min="0" value={form.fk} onChange={(e) => set('fk', e.target.value)} placeholder="—" style={iSt} />
            </EField>
            <EField label={isCFCWed ? 'Mainstream High' : 'Mainstream'} T={T}>
              <input type="number" min="0" value={form.ms} onChange={(e) => set('ms', e.target.value)} placeholder="—" style={iSt} />
            </EField>
            {isCFCWed && (
              <EField label="Mainstream Mid" T={T}>
                <input type="number" min="0" value={form.msM} onChange={(e) => set('msM', e.target.value)} placeholder="—" style={iSt} />
              </EField>
            )}
            <EField label="Total" T={T}>
              <div style={{
                height: 38, display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: T.display, fontSize: 22, fontWeight: 600,
                fontVariantNumeric: 'tabular-nums', color: total ? T.ink : T.ink3,
                background: total ? T.cardAlt || T.card : 'transparent',
                borderRadius: 4, border: `1px solid ${total ? T.rule : 'transparent'}`,
              }}>
                {total || '—'}
              </div>
            </EField>
          </div>

          <EField label="Special Event (optional)" T={T}>
            <div style={{ marginTop: 8 }}>
              <select value={form.eventId || ''} onChange={(e) => {
                const id = e.target.value || null;
                set('eventId', id);
                if (id) {
                  const ev = (window.loadEventRegistry() || []).find(ev => ev.id === id);
                  set('excludeFromWeekly', ev ? !ev.countsTowardWeekly : false);
                } else {
                  set('excludeFromWeekly', false);
                }
              }} style={iSt}>
                <option value="">— None —</option>
                {(window.loadEventRegistry() || []).map((ev) => (

<script type="text/babel">

// ── EventAssignPicker — shown in service detail drawers/sheets ────────────────
function EventAssignPicker({ T, record, onDataChange }) {
  const events = window.loadEventRegistry();
  const key = window.eventKey(record);

  const initState = () => {
    const assignments = window.loadEventAssignments();
    const asgn = assignments[key];
    const assignedId = typeof asgn === 'string' ? asgn : (asgn && asgn.eventId) || null;
    const assignmentExclude = (asgn && typeof asgn === 'object' && typeof asgn.excludeFromWeekly === 'boolean') ? asgn.excludeFromWeekly : null;
    const eventId = record.eventId || assignedId || '';
    let exclude;
    if (assignmentExclude !== null) { exclude = assignmentExclude; }
    else if (typeof record.excludeFromWeekly === 'boolean') { exclude = record.excludeFromWeekly; }
    else if (eventId) { const ev = events.find(e => e.id === eventId); exclude = ev ? !ev.countsTowardWeekly : false; }
    else { exclude = false; }
    return { eventId, exclude };
  };

  const s0 = initState();
  const [currentId, setCurrentId] = React.useState(s0.eventId);
  const [exclude, setExclude] = React.useState(s0.exclude);
  const [flash, setFlash] = React.useState(false);

  const doSave = (eventId, excl) => {
    const assignments = window.loadEventAssignments();
    const next = { ...assignments };
    if (eventId) { next[key] = { eventId, excludeFromWeekly: excl }; } else { delete next[key]; }
    window.saveEventAssignments(next);
    window.mergeAttendance();
    if (onDataChange) onDataChange();
    setFlash(true);
    setTimeout(() => setFlash(false), 1400);
  };

  const handleEventChange = (id) => {
    setCurrentId(id);
    let newExclude = exclude;
    if (id) {
      const ev = events.find(e => e.id === id);
      if (ev) { newExclude = !ev.countsTowardWeekly; setExclude(newExclude); }
    } else { newExclude = false; setExclude(false); }
    doSave(id, newExclude);
  };

  const handleExcludeChange = (val) => {
    setExclude(val);
    doSave(currentId, val);
  };

  const selSt = {
    width: '100%', height: 36, padding: '0 10px',
    border: `1px solid ${T.rule}`, borderRadius: 4,
    background: T.card, color: T.ink, fontFamily: T.sans, fontSize: 13, outline: 'none',
  };

  return (
    <div style={{ marginTop: 18, paddingTop: 16, borderTop: `1px solid ${T.rule}` }}>
      <div style={{ fontFamily: T.mono, fontSize: 9.5, letterSpacing: '.2em', textTransform: 'uppercase', color: T.ink3, marginBottom: 8 }}>Special Event</div>
      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
        <select value={currentId} onChange={(e) => handleEventChange(e.target.value)} style={{ ...selSt, flex: 1 }}>
          <option value="">— None —</option>
          {events.map(ev => <option key={ev.id} value={ev.id}>{ev.name}</option>)}
        </select>
        <span style={{ fontFamily: T.mono, fontSize: 10, color: T.sage, letterSpacing: '.06em', opacity: flash ? 1 : 0, transition: 'opacity .3s', flexShrink: 0 }}>✓ saved</span>
      </div>
      {currentId && (
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 10, cursor: 'pointer', fontFamily: T.sans, fontSize: 13, color: T.ink2, userSelect: 'none' }}>
          <input type="checkbox" checked={!exclude} onChange={(e) => handleExcludeChange(!e.target.checked)} style={{ width: 15, height: 15, accentColor: T.wine }} />
          Include in weekly totals
          {exclude && <span style={{ fontFamily: T.mono, fontSize: 10, color: T.gold, letterSpacing: '.06em', marginLeft: 4 }}>⚠ excluded</span>}
        </label>
      )}
    </div>
  );
}

// ── EventsTab (desktop) ────────────────────────────────────────────────────────
function EventsTab({ T, dens }) {
  const events = window.loadEventRegistry();

  function buildEventData(ev) {
    const rows = ALL.filter(r => r.eventId === ev.id);

    return years.map(yr => {

        year: yr,
        total: yrRows.reduce((s, r) => s + (r.total || 0), 0),

                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </td>

            <div style={{ fontFamily: T.display, fontSize: 16, fontWeight: 500, flex: 1 }}>{ev.name}</div>
            {!ev.countsTowardWeekly && (
              <div style={{ fontFamily: T.mono, fontSize: 8.5, letterSpacing: '.12em', color: T.gold, textTransform: 'uppercase' }}>excl. weekly</div>
            )}
          </div>
          <div>
            {years.map((y, i) => {
              const prior = years[i - 1];
              const delta = prior ? (y.total - prior.total) / prior.total * 100 : null;
              const absChg = prior ? y.total - prior.total : null;
              const up = delta != null && delta >= 0;
              const isOpen = openRow && openRow.eventId === ev.id && openRow.year === y.year;
              const drillRows = isOpen ? ALL.filter(r => r.eventId === ev.id && r.year === y.year).sort((a, b) => a.date < b.date ? -1 : 1) : [];
              return (
                <React.Fragment key={y.year}>
                  <div onClick={() => setOpenRow(isOpen ? null : { eventId: ev.id, year: y.year })} style={{ display: 'flex', alignItems: 'center', padding: '10px 14px', borderBottom: (isOpen || i < years.length - 1) ? `1px solid ${T.ruleLight || T.rule}` : 'none', cursor: 'pointer', background: isOpen ? (T.cardAlt || 'rgba(0,0,0,0.03)') : 'transparent' }}>
                    <div style={{ fontFamily: T.mono, fontSize: 12, color: T.ink2, width: 52, display: 'flex', alignItems: 'center', gap: 4 }}>
                      <span style={{ fontSize: 8, color: T.ink3 }}>{isOpen ? '▾' : '▸'}</span>{y.year}
                    </div>
                    <div style={{ flex: 1, fontFamily: T.display, fontSize: 18, fontWeight: 600, fontVariantNumeric: 'tabular-nums' }}>{y.total.toLocaleString()}</div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontFamily: T.mono, fontSize: 11.5, fontWeight: 600, color: delta == null ? T.ink3 : (up ? T.good : T.bad) }}>
                        {delta == null ? '—' : (up ? '+' : '') + delta.toFixed(1) + '%'}
                      </div>
                      {absChg != null && (
                        <div style={{ fontFamily: T.mono, fontSize: 9.5, fontVariantNumeric: 'tabular-nums', color: up ? T.good : T.bad, fontWeight: 600, marginTop: 1 }}>
                          {(absChg >= 0 ? '+' : '') + Math.round(absChg).toLocaleString()}
                        </div>
                      )}
                    </div>
                  </div>
                  {isOpen && (
                    <div style={{ borderBottom: `1px solid ${T.ruleLight || T.rule}`, background: T.cardAlt || 'rgba(0,0,0,0.02)', padding: '8px 14px 12px' }}>
                      {drillRows.map((r, idx) => (
                        <div key={idx} style={{ display: 'flex', alignItems: 'baseline', gap: 8, padding: '6px 0', borderBottom: idx < drillRows.length - 1 ? `1px solid ${T.ruleLight || T.rule}` : 'none' }}>
                          <div style={{ fontFamily: T.mono, fontSize: 10.5, color: T.ink3, flexShrink: 0, width: 84 }}>{r.date}</div>
                          <div style={{ fontFamily: T.sans, fontSize: 12, fontWeight: 600, flexShrink: 0, width: 60 }}>{r.campus}</div>
                          <div style={{ fontFamily: T.display, fontStyle: 'italic', fontSize: 12, color: T.ink2, flex: 1, minWidth: 0 }}>{window.serviceLabel(r)}</div>
                          <div style={{ fontFamily: T.display, fontSize: 14, fontWeight: 600, fontVariantNumeric: 'tabular-nums', flexShrink: 0 }}>{(r.total || 0).toLocaleString()}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

window.EventAssignPicker = EventAssignPicker;
window.EventHighlightCard = EventHighlightCard;
window.MEventHighlightCard = MEventHighlightCard;
window.EventsTab = EventsTab;
window.MEventsTab = MEventsTab;

</script>

<script type="text/babel">

function StatusBarRight() {
  return (
    <span style={{display:'flex',alignItems:'center',gap:6}}>
      <svg width="17" height="11" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill="currentColor"/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill="currentColor"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="currentColor"/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill="currentColor"/></svg>
      <svg width="15" height="11" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="currentColor"/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="currentColor"/><circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/></svg>
      <svg width="24" height="11" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="currentColor"/><path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="currentColor" fillOpacity="0.4"/></svg>
    </span>
  );
}

const MOBILE_BP = 900;

function App() {
  const [isMobile, setIsMobile] = React.useState(window.innerWidth < MOBILE_BP);
  const [showEntry, setShowEntry] = React.useState(false);
  const [editingRecord, setEditingRecord] = React.useState(null);
  const [dataVersion, setDataVersion] = React.useState(0);
  const [refreshVersion, setRefreshVersion] = React.useState(0);
  const [t, setT] = window.useTweaks({ density: 'comfortable' });

  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < MOBILE_BP);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);

  React.useEffect(() => {
    document.body.style.background = isMobile ? '#1a120c' : '#f7f1e6';
    document.body.style.overscrollBehavior = isMobile ? 'none' : '';
  }, [isMobile]);

  // Sync data when another tab saves to localStorage
  React.useEffect(() => {
    const onStorage = (e) => {
      if (e.key === 'fc_attendance_entries' || e.key === 'fc_event_assignments' || e.key === 'fc_event_registry') {
        window.mergeAttendance();
        setDataVersion(v => v + 1);
      }
    };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  React.useEffect(() => {
    const h = () => setDataVersion(v => v + 1);
    window.addEventListener('fc-published', h);
    return () => window.removeEventListener('fc-published', h);
  }, []);

  const handleSaved = () => {
    window.mergeAttendance();
    setDataVersion(v => v + 1);
  };

  const handleDataChange = () => {
    window.mergeAttendance();
    setRefreshVersion(v => v + 1);
  };

  const handleEditRecord = (record) => setEditingRecord(record);
  const handleEditClose = () => setEditingRecord(null);

  if (isMobile) {
    return (
      <React.Fragment>
        <div className="stage">
          <div className="device-shell">
            <div className="device-island"/>
            <div className="device-statusbar">
              <span>9:41</span>
              <StatusBarRight/>
            </div>
            <div className="device-content">
              <window.MobileView key={dataVersion} refreshVersion={refreshVersion} onAddEntry={() => setShowEntry(true)} onDataChange={handleDataChange} onEditRecord={handleEditRecord} />
            </div>
            <div className="device-home"/>
          </div>
          <div className="desktop-caption">Faith Church · Mobile Brief · resize narrow or open on iPhone for fullscreen</div>
        </div>
        {showEntry && (
          <window.DataEntryModal
            onClose={() => setShowEntry(false)}
            onSaved={handleSaved}
          />
        )}
        {editingRecord && (
          <window.DataEntryModal
            editEntry={editingRecord}
            onClose={handleEditClose}
            onSaved={handleSaved}
          />
        )}
      </React.Fragment>
    );
  }

  return (
    <React.Fragment>
      <window.MainView key={dataVersion} refreshVersion={refreshVersion} density={t.density} onDataChange={handleDataChange} onEditRecord={handleEditRecord} />
      <window.AddEntryFAB onClick={() => setShowEntry(true)} />
      {showEntry && (
        <window.DataEntryModal
          onClose={() => setShowEntry(false)}
          onSaved={handleSaved}
        />
      )}
      {editingRecord && (
        <window.DataEntryModal
          editEntry={editingRecord}
          onClose={handleEditClose}
          onSaved={handleSaved}
        />
      )}
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Density"/>
        <window.TweakRadio
          label="Spacing"
          value={t.density}
          options={['comfortable','compact']}
          onChange={(v) => setT('density', v)}
        />
      </window.TweaksPanel>
    </React.Fragment>
  );
}

const waitFor = (cond) => new Promise(r => {
  const check = () => cond() ? r() : setTimeout(check, 30);
  check();
});

(async () => {
  try {
    const _TOKEN = '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';
    const _r = await fetch('https://api.github.com/repos/Israelt4/faith-attendance/contents/manual-entries.json', {
      headers: { 'Authorization': 'Bearer ' + _TOKEN, 'Accept': 'application/vnd.github+json' },
      cache: 'no-store'
    });
    if (_r.ok) {
      const _j = await _r.json();
      window.PUBLISHED_ENTRIES = JSON.parse(atob(_j.content.replace(/\s/g, '')));
      window.mergeAttendance();
    }
  } catch(_e) {}

  await waitFor(() =>
    window.MobileView && window.MainView && window.LineChart && window.agg
    && window.DataEntryModal && window.AddEntryFAB && window.M_THEME
    && window.useTweaks && window.TweaksPanel
    && window.EventsTab && window.MEventsTab && window.EventAssignPicker
    && window.EventHighlightCard && window.MEventHighlightCard && window.PublishButton
  );
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();

</script>

</body>
