<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Faith Church · Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f7f1e6; }
  body { font-family: 'Hanken Grotesk', -apple-system, system-ui, sans-serif; color: #231811; }
  *, *::before, *::after { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="aggregate.jsx"></script>
<script type="text/babel" src="main-view.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [t, setT] = window.useTweaks(TWEAK_DEFAULTS);
  return (
    <React.Fragment>
      <window.MainView density={t.density}/>
      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Density"/>
        <window.TweakRadio
          label="Spacing"
          value={t.density}
          options={['comfortable','compact']}
          onChange={(v)=>setT('density', v)}
        />
      </window.TweaksPanel>
    </React.Fragment>
  );
}

const waitFor = (cond) => new Promise(r => {
  const check = () => cond() ? r() : setTimeout(check, 30);
  check();
});

(async () => {
  await waitFor(() => window.TweaksPanel && window.useTweaks
    && window.MainView && window.LineChart && window.agg);
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
})();
</script>
</body>
</html>
